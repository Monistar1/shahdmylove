<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#9d4edd">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <title>الموسيقى — شودي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/core.css">
  <style>
    html {
      overflow-x: hidden;
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }
    body { overflow-x: hidden; }

    .music-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xl);
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
    }

    .vinyl-player {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto;
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.35));
    }

    .vinyl-record {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      position: relative;
      background:
        /* center hole */
        radial-gradient(circle at 50% 50%, rgba(20,20,25,0.95) 0%, rgba(20,20,25,0.95) 4.2%, transparent 4.4%),
        /* label */
        radial-gradient(circle at 50% 50%, transparent 28%, var(--accent-purple) 28.5%, var(--accent-rose) 31%, var(--accent-purple) 33%, transparent 33.5%),
        /* grooves */
        repeating-radial-gradient(circle at 50% 50%,
          rgba(255,255,255,0.06) 0px,
          rgba(255,255,255,0.02) 1px,
          rgba(0,0,0,0.15) 2px,
          rgba(255,255,255,0.04) 3px,
          rgba(255,255,255,0.01) 4px
        ),
        /* base disc */
        conic-gradient(from 180deg, #1a1a1f, #2a2a32, #1a1a1f, #2a2a32, #1a1a1f);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.06),
        0 0 0 7px rgba(0,0,0,0.2),
        0 20px 50px rgba(0,0,0,0.45),
        0 0 60px rgba(157,78,221,0.18);
      animation: vinylSpin 5s linear infinite paused;
      transform: translateZ(0);
      will-change: transform;
      overflow: hidden;
    }

    .vinyl-record::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 45deg,
        rgba(255,255,255,0.12) 0deg,
        rgba(255,255,255,0.02) 30deg,
        rgba(255,255,255,0) 60deg,
        rgba(255,255,255,0.06) 90deg,
        rgba(255,255,255,0) 120deg,
        rgba(255,255,255,0.1) 150deg,
        rgba(255,255,255,0) 180deg,
        rgba(255,255,255,0.04) 210deg,
        rgba(255,255,255,0) 240deg,
        rgba(255,255,255,0.08) 270deg,
        rgba(255,255,255,0) 300deg,
        rgba(255,255,255,0.12) 330deg,
        rgba(255,255,255,0.02) 360deg
      );
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .vinyl-record::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.18), transparent 45%);
      pointer-events: none;
    }

    .vinyl-record.playing { animation-play-state: running; }

    @keyframes vinylSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .vinyl-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 2px 10px rgba(0,0,0,0.25),
        0 0 0 2px rgba(255,255,255,0.08);
      z-index: 2;
    }

    .vinyl-label span {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--text-on-accent);
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .vinyl-arm {
      position: absolute;
      top: 18px; right: 18px;
      width: 92px; height: 5px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent-gold), white 30%), color-mix(in srgb, var(--accent-gold), black 25%));
      border-radius: 3px;
      transform-origin: right center;
      transform: rotate(-32deg);
      transition: transform 0.8s var(--ease-out-expo);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      z-index: 3;
    }

    .vinyl-arm::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4af37, #b8860b);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .vinyl-arm.playing { transform: rotate(10deg); }

    .visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      height: 64px;
      margin-top: var(--space-lg);
    }

    .viz-bar {
      width: 6px;
      background: linear-gradient(180deg, var(--accent-rose), var(--accent-purple));
      border-radius: 4px;
      transition: height 0.1s ease;
      opacity: 0.75;
      box-shadow: 0 0 8px rgba(157,78,221,0.25);
    }

    .player-card {
      width: 100%;
      max-width: 500px;
    }

    .player-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-lg) var(--space-md);
    }

    .track-info {
      text-align: center;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .track-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--text-primary);
      font-weight: 700;
    }

    .track-artist {
      font-size: var(--text-sm);
      color: var(--text-muted);
    }

    .control-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
    }

    .control-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.4));
      color: var(--text-primary);
      border-radius: 50%;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out-expo);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(4px);
    }

    .control-btn:hover {
      transform: translateY(-2px) scale(1.05);
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.6));
      box-shadow: var(--shadow-md);
    }

    .control-btn:active { transform: translateY(0) scale(0.97); }

    .control-btn--small { width: 44px; height: 44px; }
    .control-btn--main {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-purple));
      color: var(--text-on-accent);
      box-shadow: 0 8px 24px rgba(157,78,221,0.35);
    }

    .control-btn--main:hover {
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-rose));
      box-shadow: 0 12px 30px rgba(157,78,221,0.45);
    }

    .control-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .control-btn--main svg { width: 28px; height: 28px; }

    .progress-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      direction: ltr;
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .progress-bar {
      flex: 1;
      direction: ltr;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(0,0,0,0.12);
      outline: none;
      cursor: pointer;
    }

    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-purple));
      box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
      cursor: pointer;
      transition: transform var(--duration-fast);
    }

    .progress-bar::-webkit-slider-thumb:hover { transform: scale(1.15); }

    .progress-bar::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-purple));
      box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
      cursor: pointer;
    }

    .progress-bar::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent-rose), var(--accent-purple)) 0% 0% / var(--progress, 0%) 100% no-repeat, rgba(0,0,0,0.12);
    }

    .progress-bar::-moz-range-track {
      height: 6px;
      border-radius: 3px;
      background: rgba(0,0,0,0.12);
    }

    .progress-bar::-moz-range-progress {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent-rose), var(--accent-purple));
    }

    .song-list {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: linear-gradient(135deg, rgba(255,255,255,0.62), rgba(255,255,255,0.38));
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out-expo);
      box-shadow: 0 1px 3px rgba(74, 14, 46, 0.05);
    }

    .song-item:hover {
      transform: translateX(-4px);
      background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(255,255,255,0.58));
      box-shadow: var(--shadow-md);
    }

    .song-item.active {
      background: linear-gradient(135deg, rgba(var(--color-primary-rgb), 0.14), rgba(var(--lily-purple-rgb), 0.1));
      border-color: rgba(var(--color-primary-rgb), 0.4);
      box-shadow: 0 0 20px rgba(var(--color-primary-rgb), 0.12);
    }

    .song-num {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--text-muted);
      width: 26px;
    }

    .song-info { flex: 1; }
    .song-title { font-weight: 700; color: var(--text-primary); font-size: var(--text-base); }
    .song-artist { font-size: var(--text-xs); color: var(--text-muted); }

    .song-play {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-pink));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-on-accent);
      flex-shrink: 0;
      transition: transform var(--duration-fast);
      box-shadow: 0 4px 12px rgba(233,30,99,0.25);
    }

    .song-play:hover { transform: scale(1.12); }
    .song-play svg { width: 15px; height: 15px; fill: currentColor; margin-inline-end: -1px; }

    .lyrics-box {
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
      width: 100%;
      max-width: 500px;
    }

    .lyrics-text {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      color: var(--text-secondary);
      line-height: 1.8;
      transition: opacity 0.5s;
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .vinyl-card { padding: var(--space-xl); }

    @media (max-width: 640px) {
      .vinyl-player { transform: scale(0.82); }
      .music-stage { gap: var(--space-lg); }
    }

    @media (max-width: 480px) {
      .vinyl-card { padding: var(--space-lg) var(--space-md); }
      .player-controls { padding: var(--space-md) var(--space-sm); }
      .vinyl-player { transform: scale(0.74); }
      .control-btn--small { width: 40px; height: 40px; }
      .control-btn--main { width: 56px; height: 56px; }
      .progress-bar::-webkit-slider-thumb {
        width: 22px;
        height: 22px;
        box-shadow: 0 0 0 5px rgba(255,255,255,0.5);
      }
      .progress-bar::-moz-range-thumb {
        width: 22px;
        height: 22px;
        box-shadow: 0 0 0 5px rgba(255,255,255,0.5);
      }
    }
  </style>
</head>

          <div class="song-info">
            <div class="song-title">إلى الأبد</div>
            <div class="song-artist">لشودي</div>
          </div>
          <div class="song-play" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/self-evolve.js"></script>
  <script src="js/engine3d.js"></script>
  <script src="js/petals.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/core.js"></script>
  <script src="js/narrative.js"></script>
  <script src="js/fps.js"></script>
  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const vinyl = document.getElementById('vinylRecord');
      const arm = document.getElementById('vinylArm');
      const lyrics = document.getElementById('lyricsText');
      const viz = document.getElementById('visualizer');
      const audio = document.getElementById('audioPlayer');
      const playPauseBtn = document.getElementById('playPauseBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const playIcon = document.getElementById('playIcon');
      const pauseIcon = document.getElementById('pauseIcon');
      const progressBar = document.getElementById('progressBar');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl = document.getElementById('duration');
      const trackTitle = document.getElementById('trackTitle');
      const trackArtist = document.getElementById('trackArtist');
      const songItems = Array.from(document.querySelectorAll('.song-item'));

      let currentIndex = -1;
      let playing = false;
      let vizInterval = null;
      let rafId = null;
      let isSeeking = false;
      let transitioning = false;

      // Initialize progress bar fill
      progressBar.style.setProperty('--progress', '0%');

      // Build visualizer bars
      for (let i = 0; i < 22; i++) {
        const bar = document.createElement('div');
        bar.className = 'viz-bar';
        bar.style.height = '4px';
        viz.appendChild(bar);
      }

      function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m + ':' + (s < 10 ? '0' + s : s);
      }

      function updatePlayIcon(isPlaying) {
        if (isPlaying) {
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'block';
          playPauseBtn.setAttribute('aria-label', 'إيقاف مؤقت');
        } else {
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
          playPauseBtn.setAttribute('aria-label', 'تشغيل');
        }
      }

      function setActiveSong(index) {
        songItems.forEach((s, i) => {
          s.classList.toggle('active', i === index);
        });
      }

      function loadSong(index) {
        if (index < 0) index = songItems.length - 1;
        if (index >= songItems.length) index = 0;
        currentIndex = index;
        transitioning = true;

        const item = songItems[index];
        const src = item.getAttribute('data-src');
        const lyric = item.getAttribute('data-lyric');
        const title = item.querySelector('.song-title').textContent;
        const artist = item.querySelector('.song-artist').textContent;

        // Reset progress UI before new source loads
        progressBar.value = 0;
        progressBar.style.setProperty('--progress', '0%');
        currentTimeEl.textContent = '0:00';
        durationEl.textContent = '0:00';

        audio.src = src;
        audio.load();
        setActiveSong(index);
        trackTitle.textContent = title;
        trackArtist.textContent = artist;

        lyrics.style.opacity = '0';
        setTimeout(() => {
          lyrics.textContent = lyric;
          lyrics.style.opacity = '1';
        }, 300);

        // Clear transition guard after source swap settles
        setTimeout(() => { transitioning = false; }, 80);
      }

      function playCurrent() {
        if (currentIndex === -1) {
          loadSong(0);
        }
        const playPromise = audio.play();
        if (playPromise && typeof playPromise.then === 'function') {
          playPromise.catch(() => {
            // Auto-play blocked; UI stays ready for user gesture
          });
        }
      }

      function pauseCurrent() {
        audio.pause();
      }

      function startVisualizer() {
        if (vizInterval) clearInterval(vizInterval);
        vizInterval = setInterval(() => {
          viz.querySelectorAll('.viz-bar').forEach(bar => {
            bar.style.height = (4 + Math.random() * 52) + 'px';
          });
        }, 100);
      }

      function stopVisualizer() {
        if (vizInterval) { clearInterval(vizInterval); vizInterval = null; }
        viz.querySelectorAll('.viz-bar').forEach(bar => { bar.style.height = '4px'; });
      }

      function onPlay() {
        playing = true;
        vinyl.classList.add('playing');
        arm.classList.add('playing');
        updatePlayIcon(true);
        startVisualizer();
        startProgressLoop();
      }

      function onPause() {
        if (transitioning) return;
        playing = false;
        vinyl.classList.remove('playing');
        arm.classList.remove('playing');
        updatePlayIcon(false);
        stopVisualizer();
        stopProgressLoop();
      }

      function updateProgress() {
        if (!audio.duration || isSeeking) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressBar.value = pct;
        progressBar.style.setProperty('--progress', pct + '%');
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationEl.textContent = formatTime(audio.duration);
      }

      function startProgressLoop() {
        stopProgressLoop();
        function loop() {
          updateProgress();
          rafId = requestAnimationFrame(loop);
        }
        loop();
      }

      function stopProgressLoop() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      }

      function seek(value) {
        if (!audio.duration) return;
        const time = (value / 100) * audio.duration;
        audio.currentTime = time;
      }

      songItems.forEach((item, index) => {
        item.addEventListener('click', () => {
          if (currentIndex === index && playing) {
            pauseCurrent();
          } else if (currentIndex === index && !playing) {
            playCurrent();
          } else {
            loadSong(index);
            playCurrent();
          }
        });
      });

      playPauseBtn.addEventListener('click', () => {
        if (currentIndex === -1) {
          loadSong(0);
          playCurrent();
        } else if (playing) {
          pauseCurrent();
        } else {
          playCurrent();
        }
      });

      prevBtn.addEventListener('click', () => {
        const wasPlaying = playing;
        loadSong(currentIndex - 1);
        if (wasPlaying) playCurrent();
      });

      nextBtn.addEventListener('click', () => {
        const wasPlaying = playing;
        loadSong(currentIndex + 1);
        if (wasPlaying) playCurrent();
      });

      audio.addEventListener('play', onPlay);
      audio.addEventListener('pause', onPause);
      audio.addEventListener('ended', () => {
        loadSong(currentIndex + 1);
        playCurrent();
      });
      audio.addEventListener('timeupdate', updateProgress);
      audio.addEventListener('loadedmetadata', updateProgress);
      audio.addEventListener('durationchange', updateProgress);
      audio.addEventListener('error', () => {
        transitioning = false;
        trackTitle.textContent = 'تعذر تحميل الأغنية';
        trackArtist.textContent = 'تأكد من وجود الملف';
        onPause();
      });

      progressBar.addEventListener('input', () => {
        isSeeking = true;
        progressBar.style.setProperty('--progress', progressBar.value + '%');
        if (audio.duration) {
          currentTimeEl.textContent = formatTime((progressBar.value / 100) * audio.duration);
        }
      });

      progressBar.addEventListener('change', () => {
        seek(progressBar.value);
        isSeeking = false;
      });

      progressBar.addEventListener('mouseup', () => { isSeeking = false; });
      progressBar.addEventListener('touchend', () => { isSeeking = false; });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
          e.preventDefault();
          playPauseBtn.click();
        }
        if (e.code === 'ArrowRight') { nextBtn.click(); }
        if (e.code === 'ArrowLeft') { prevBtn.click(); }
      });
    })();
  </script>
