  <style>
    .vinyl-player {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto;
    }

    .vinyl-record {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, color-mix(in srgb, black, white 10%) 8%, transparent 10%),
        repeating-radial-gradient(circle at 50% 50%, color-mix(in srgb, black, white 13%) 0px, color-mix(in srgb, black, white 7%) 2px, color-mix(in srgb, black, white 13%) 3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 4px rgba(255,255,255,0.1);
      position: relative;
      animation: vinylSpin 4s linear infinite paused;
    }

    .vinyl-record.playing { animation-play-state: running; }

    @keyframes vinylSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .vinyl-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90px; height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .vinyl-label span {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text-on-accent);
      font-weight: 700;
    }

    .vinyl-arm {
      position: absolute;
      top: 20px; right: 20px;
      width: 80px; height: 4px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent-gold), white 20%), color-mix(in srgb, var(--accent-gold), black 30%));
      border-radius: 2px;
      transform-origin: right center;
      transform: rotate(-30deg);
      transition: transform 0.8s var(--ease-out-expo);
    }

    .vinyl-arm.playing { transform: rotate(8deg); }

    .visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 60px;
      margin-top: var(--space-lg);
    }

    .viz-bar {
      width: 6px;
      background: linear-gradient(180deg, var(--accent-rose), var(--accent-purple));
      border-radius: 3px;
      transition: height 0.1s ease;
      opacity: 0.6;
    }

    .song-list {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.4));
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out-expo);
    }

    .song-item:hover {
      transform: translateX(-4px);
      background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.6));
      box-shadow: var(--shadow-md);
    }

    .song-item.active {
      background: linear-gradient(135deg, rgba(var(--color-primary-rgb), 0.1), rgba(var(--lily-purple-rgb), 0.08));
      border-color: rgba(var(--color-primary-rgb), 0.3);
    }

    .song-num {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--text-muted);
      width: 24px;
    }

    .song-info { flex: 1; }
    .song-title { font-weight: 700; color: var(--text-primary); font-size: var(--text-base); }
    .song-artist { font-size: var(--text-xs); color: var(--text-muted); }

    .song-play {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-pink));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-on-accent);
      flex-shrink: 0;
      transition: transform var(--duration-fast);
    }

    .song-play:hover { transform: scale(1.1); }
    .song-play svg { width: 14px; height: 14px; fill: currentColor; margin-right: -1px; }

    .lyrics-box {
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
    }

    .lyrics-text {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      color: var(--text-secondary);
      line-height: 1.8;
      transition: opacity 0.5s;
    }

    @media (max-width: 640px) {
      .vinyl-player { transform: scale(0.85); }
    }
  </style>

  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const vinyl = document.getElementById('vinylRecord');
      const arm = document.getElementById('vinylArm');
      const lyrics = document.getElementById('lyricsText');
      const viz = document.getElementById('visualizer');
      let playing = false;
      let vizInterval = null;

      // Build visualizer bars
      for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div');
        bar.className = 'viz-bar';
        bar.style.height = '4px';
        viz.appendChild(bar);
      }

      document.querySelectorAll('.song-item').forEach(item => {
        item.addEventListener('click', () => {
          const lyric = item.getAttribute('data-lyric');
          const isActive = item.classList.contains('active');
          document.querySelectorAll('.song-item').forEach(s => s.classList.remove('active'));
          if (!isActive) {
            item.classList.add('active');
            playSong(lyric);
          } else {
            pauseSong();
          }
        });
      });

      function playSong(lyric) {
        playing = true;
        vinyl.classList.add('playing');
        arm.classList.add('playing');
        lyrics.style.opacity = '0';
        setTimeout(() => {
          lyrics.textContent = lyric;
          lyrics.style.opacity = '1';
        }, 300);
        if (vizInterval) clearInterval(vizInterval);
        vizInterval = setInterval(() => {
          viz.querySelectorAll('.viz-bar').forEach(bar => {
            bar.style.height = (4 + Math.random() * 50) + 'px';
          });
        }, 100);
      }

      function pauseSong() {
        playing = false;
        vinyl.classList.remove('playing');
        arm.classList.remove('playing');
        if (vizInterval) { clearInterval(vizInterval); vizInterval = null; }
        viz.querySelectorAll('.viz-bar').forEach(bar => { bar.style.height = '4px'; });
      }
    })();
  </script>
