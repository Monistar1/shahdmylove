  <style>
    /* ── Countdown Grid ── */
    .countdown-grid {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      width: 100%;
      max-width: 680px;
    }

    .countdown-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      min-width: 92px;
      padding: var(--space-5) var(--space-6);
    }

    .countdown-value {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .countdown-label {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .countdown-sep {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--accent-pink);
      opacity: 0.5;
      line-height: 1;
      margin-top: calc(var(--space-1) * -1);
    }

    /* ── Hourglass SVG ── */
    .hourglass-wrap {
      position: relative;
      width: 120px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hourglass-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #sandTop,
    #sandBottom {
      transition: all 1s linear;
    }

    .hourglass-glow {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background: radial-gradient(ellipse, color-mix(in srgb, var(--rose-300) 18%, transparent), transparent 70%);
      animation: breathe 4s ease-in-out infinite;
      pointer-events: none;
    }

    /* ── Daily Message ── */
    .daily-message-card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .message-icon-wrap {
      width: 40px;
      height: 40px;
      margin: 0 auto var(--space-4);
      color: var(--accent-rose);
      animation: float 3s ease-in-out infinite;
    }

    .body-text {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text-secondary);
      line-height: 1.9;
      min-height: 3.5em;
    }

    /* ── Chat ── */
    .chat-section {
      width: 100%;
      max-width: 640px;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .chat-messages {
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding-left: var(--space-1);
    }

    .chat-input-row {
      display: flex;
      gap: var(--space-3);
      align-items: stretch;
    }

    .chat-input {
      flex: 1;
      padding: var(--space-3) var(--space-5);
      background: color-mix(in srgb, var(--bg-primary) 50%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent-rose) 15%, transparent);
      border-radius: var(--radius-xl);
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text-primary);
      transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent-rose);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-rose) 10%, transparent);
    }

    .chat-error {
      font-size: var(--text-xs);
      color: var(--accent-rose);
      text-align: center;
      padding: var(--space-1);
      opacity: 0;
      transition: opacity var(--duration-fast);
      min-height: 1.5em;
    }

    .chat-error.show {
      opacity: 1;
    }

    /* ── Wishes ── */
    .wish-item {
      background: color-mix(in srgb, var(--rose-100) 40%, transparent);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      color: var(--text-primary);
      border-right: 3px solid var(--accent-rose);
      animation: slideInRight 0.35s var(--ease-out-expo);
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .wish-item::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent-rose);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent-rose) 35%, transparent);
    }

    .wish-item.optimistic {
      opacity: 0.6;
      border-right-color: var(--accent-pink);
    }

    .wish-item.optimistic::before {
      background: var(--accent-pink);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .message-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
    }

    .message-text {
      word-break: break-word;
      line-height: 1.6;
    }

    .message-time {
      font-size: var(--text-xs);
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Thought Counter ── */
    .thought-card {
      max-width: 420px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-5);
      position: relative;
      overflow: hidden;
    }

    .thought-icon-wrap {
      width: 44px;
      height: 44px;
      color: var(--text-muted);
      flex-shrink: 0;
      animation: think 3s ease-in-out infinite;
    }

    @keyframes think {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .thought-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .thought-label {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--text-muted);
      font-weight: 500;
    }

    .thought-count {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--accent-rose);
      line-height: 1;
    }

    .thought-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: color-mix(in srgb, var(--rose-200) 30%, transparent);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    .thought-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-rose), var(--accent-pink));
      border-radius: inherit;
      transition: width var(--duration-base) var(--ease-smooth);
    }

    /* ── Connection Dot ── */
    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: auto;
      transition: background-color var(--duration-fast);
    }

    .connection-dot.online {
      background: var(--accent-rose);
      box-shadow: 0 0 6px color-mix(in srgb, var(--accent-rose) 50%, transparent);
    }

    .connection-dot.offline {
      background: var(--text-muted);
    }

    .connection-dot.connecting {
      background: var(--accent-gold);
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ── Confetti ── */
    .confetti-particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
    }

    @media (max-width: 640px) {
      .countdown-grid {
        gap: var(--space-2);
      }

      .countdown-box {
        min-width: 72px;
        padding: var(--space-4) var(--space-3);
      }

      .countdown-value {
        font-size: var(--text-2xl);
      }

      .countdown-sep {
        font-size: var(--text-xl);
      }

      .hourglass-wrap {
        transform: scale(0.88);
      }

      .chat-section {
        max-width: 100%;
      }
    }
  </style>
</head>

  <!-- Page Logic -->
  <script>
    (function() {
      'use strict';

      if (window.Engine3D) Engine3D.init();

      const BIRTHDAY = new Date('2026-11-01T00:00:00');

      const dailyMessages = [
        'باقي أيام قليلة ونحتفل بأجمل يوم في حياتي',
        'كل يوم يمر يزيد شوقي ليوم ميلادك',
        'أنتِ أجمل هدية حصلت عليها في حياتي',
        'يوم ميلادك = بداية سنة جديدة من السعادة',
        'لا يوجد شيء أجمل من الاحتفال بكِ',
        'قلبي يخفق بسرعة كلما اقترب موعد فرحتنا',
        'أعدكِ بأجمل يوم ميلاد في حياتكِ',
        'أنتِ تستحقين كل الحب في هذا العالم'
      ];

      document.addEventListener('DOMContentLoaded', () => {
        initCountdown();
        initDailyMessage();
        initThoughtCounter();
      });

      /* ── Countdown ── */
      function initCountdown() {
        updateCountdown();
        setInterval(updateCountdown, 1000);
      }

      function updateCountdown() {
        const now = new Date();
        const diff = BIRTHDAY - now;

        if (diff <= 0) {
          document.getElementById('days').textContent = '00';
          document.getElementById('hours').textContent = '00';
          document.getElementById('minutes').textContent = '00';
          document.getElementById('seconds').textContent = '00';
          document.querySelector('.display-title').textContent = 'اليوم هو يومكِ يا ملكتي!';
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        if (daysEl) daysEl.textContent = String(days).padStart(2, '0');
        if (hoursEl) hoursEl.textContent = String(hours).padStart(2, '0');
        if (minutesEl) minutesEl.textContent = String(minutes).padStart(2, '0');
        if (secondsEl) secondsEl.textContent = String(seconds).padStart(2, '0');

        const totalSeconds = Math.floor(diff / 1000);
        const maxSeconds = 30 * 24 * 60 * 60;
        const percentage = Math.max(0, Math.min(100, (totalSeconds / maxSeconds) * 100));

        const sandTop = document.getElementById('sandTop');
        const sandBottom = document.getElementById('sandBottom');

        if (sandTop && sandBottom) {
          const maxH = 65;
          const topH = Math.max(0.1, maxH * (percentage / 100));
          const bottomH = Math.max(0.1, maxH * ((100 - percentage) / 100));
          sandTop.setAttribute('height', topH);
          sandBottom.setAttribute('height', bottomH);
          sandBottom.setAttribute('y', 140 - bottomH);
        }
      }

      /* ── Daily Message ── */
      function initDailyMessage() {
        const dayIndex = new Date().getDate() % dailyMessages.length;
        const message = dailyMessages[dayIndex];
        const textElement = document.getElementById('messageText');
        if (!textElement) return;

        let index = 0;
        textElement.textContent = '';

        function typeMessage() {
          if (index < message.length) {
            textElement.textContent += message.charAt(index);
            index++;
            setTimeout(typeMessage, 70);
          }
        }

        setTimeout(typeMessage, 600);
      }

      /* ── Thought Counter ── */
      function initThoughtCounter() {
        const counter = document.getElementById('thoughtCount');
        const fill = document.getElementById('thoughtFill');
        if (!counter) return;

        let count = parseInt(localStorage.getItem('thoughtCount') || '0');
        updateThoughtDisplay(count);

        setInterval(() => {
          count++;
          localStorage.setItem('thoughtCount', count);
          updateThoughtDisplay(count);
        }, 3000);
      }

      function updateThoughtDisplay(count) {
        const counter = document.getElementById('thoughtCount');
        const fill = document.getElementById('thoughtFill');
        if (counter) counter.textContent = count.toLocaleString('ar-SA');
        if (fill) fill.style.width = Math.min(100, (count % 100)) + '%';
      }

      /* ── Helpers ── */
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function getCssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      }

      window.createMiniConfetti = function(element) {
        const rect = element.getBoundingClientRect();
        const colors = [
          getCssVar('--accent-rose'),
          getCssVar('--accent-pink'),
          getCssVar('--accent-purple'),
          getCssVar('--accent-lilac')
        ].filter(Boolean);

        if (!colors.length) {
          const fallback = getCssVar('--accent-rose');
          if (fallback) colors.push(fallback);
          else return;
        }

        for (let i = 0; i < 12; i++) {
          const confetti = document.createElement('div');
          confetti.className = 'confetti-particle';
          confetti.style.left = (rect.left + rect.width / 2) + 'px';
          confetti.style.top = (rect.top + rect.height / 2) + 'px';
          confetti.style.background = colors[i % colors.length];
          document.body.appendChild(confetti);

          const angle = (Math.random() - 0.5) * Math.PI * 2;
          const velocity = 60 + Math.random() * 100;
          const vx = Math.cos(angle) * velocity;
          const vy = Math.sin(angle) * velocity - 90;

          let x = 0, y = 0;
          let opacity = 1;

          function animate() {
            x += vx * 0.016;
            y += vy * 0.016 + 60 * 0.016 * 0.016;
            opacity -= 0.018;

            confetti.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
            confetti.style.opacity = opacity;

            if (opacity > 0) requestAnimationFrame(animate);
            else confetti.remove();
          }

          requestAnimationFrame(animate);
        }
      };
    })();
  </script>

  <!-- Firebase Realtime Chat -->
  <script type="module">
    import { pushWish, onWishUpdate, createSkeleton } from './js/firebase.js';

    const wishesList = document.getElementById('wishesList');
    const wishInput = document.getElementById('wishInput');
    const wishBtn = document.getElementById('wishBtn');
    const chatError = document.getElementById('chatError');

    function showSkeleton() {
      if (!wishesList) return;
      wishesList.innerHTML = '';
      const skeleton = createSkeleton('text', 5);
      skeleton.className = 'chat-skeleton';
      wishesList.appendChild(skeleton);
    }

    function removeSkeleton() {
      const skeleton = wishesList?.querySelector('.chat-skeleton');
      if (skeleton) skeleton.remove();
    }

    function showError(msg) {
      if (!chatError) return;
      chatError.textContent = msg;
      chatError.classList.add('show');
      setTimeout(() => chatError.classList.remove('show'), 3500);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addWishToDOM(wish, optimistic = false) {
      if (!wishesList) return;

      const id = optimistic ? (wish._id || wish.timestamp) : wish.id;
      if (!id || document.querySelector(`[data-id="${id}"]`)) return;

      // If confirmed, remove optimistic twin by timestamp
      if (!optimistic && wish.timestamp) {
        const optimisticEls = wishesList.querySelectorAll('.optimistic');
        optimisticEls.forEach(el => {
          const ts = el.getAttribute('data-timestamp');
          if (ts && parseInt(ts) === wish.timestamp) el.remove();
        });
      }

      const item = document.createElement('div');
      item.className = 'wish-item' + (optimistic ? ' optimistic' : '');
      item.setAttribute('data-id', id);
      if (optimistic) item.setAttribute('data-timestamp', wish.timestamp);

      const time = wish.time || new Date(wish.timestamp).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
      const status = optimistic ? ' · جاري الإرسال' : '';

      item.innerHTML = `
        <div class="message-content">
          <span class="message-text">${escapeHtml(wish.text)}</span>
          <span class="message-time">${time}${status}</span>
        </div>
      `;

      wishesList.appendChild(item);
      wishesList.scrollTop = wishesList.scrollHeight;
    }

    function loadWishesRealtime() {
      if (!wishesList) return;
      showSkeleton();

      onWishUpdate((wishes, { isFirstLoad, error }) => {
        removeSkeleton();
        if (error) {
          showError('خطأ في الاتصال بالمحادثة');
          return;
        }
        if (isFirstLoad) {
          wishesList.innerHTML = '';
          wishes.forEach(wish => addWishToDOM(wish));
        } else {
          wishes.forEach(wish => addWishToDOM(wish));
        }
      });
    }

    async function addWishRealtime(text) {
      const wishData = {
        text: text,
        timestamp: Date.now(),
        time: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
      };

      try {
        await pushWish(wishData, {
          onOptimistic: (data) => addWishToDOM(data, true),
          onSuccess: () => {
            wishInput.value = '';
            if (window.createMiniConfetti) createMiniConfetti(wishBtn);
          },
          onError: (err) => {
            showError(err.message);
            // Fade out optimistic item
            const optimisticEls = wishesList.querySelectorAll('.optimistic');
            optimisticEls.forEach(el => { el.style.opacity = '0.4'; });
          }
        });
      } catch (err) {
        showError(err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (wishesList) loadWishesRealtime();

      if (wishBtn && wishInput) {
        wishBtn.addEventListener('click', () => {
          const text = wishInput.value.trim();
          if (text) addWishRealtime(text);
        });

        wishInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') wishBtn.click();
        });
      }
    });
  </script>
