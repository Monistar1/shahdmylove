  <main id="main-content" class="page-wrapper balloons-overlay">
    <h1 class="display-title display-title--1 text-gradient-rose reveal">البالونات</h1>
    <p class="reveal reveal-delay-1" style="color: var(--text-muted); font-size: var(--text-sm);">اضغط على البالونات لتفرقعها!</p>
    <div class="glass-card reveal reveal-delay-2" style="padding: var(--space-lg) var(--space-xl);">
      <span class="pop-counter" id="popCount">0</span>
      <span style="color: var(--text-muted); font-size: var(--text-sm); margin-right: var(--space-sm);">بالون منفجر</span>
    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/engine3d.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/core.js"></script>
  <script src="js/fps.js"></script>
  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const canvas = document.getElementById('balloonsCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      let balloons = [];
      let particles = [];
      let poppedCount = 0;
      const PALETTE = {
        primary: '#e91e63', pink: '#ff7a9e', purple: '#9d4edd',
        lilac: '#c8b6ff', gold: '#d4a574', lightPink: '#f472b6', rose: '#fb7185'
      };
      const colors = [PALETTE.primary, PALETTE.pink, PALETTE.purple, PALETTE.lilac, PALETTE.gold, PALETTE.lightPink, PALETTE.rose];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      class Balloon {
        constructor() {
          this.reset();
          this.y = H + Math.random() * 200;
        }
        reset() {
          this.x = Math.random() * W;
          this.y = H + 80;
          this.r = 25 + Math.random() * 20;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.speed = 0.5 + Math.random() * 1.5;
          this.wobble = Math.random() * Math.PI * 2;
          this.wobbleSpeed = 0.02 + Math.random() * 0.02;
          this.wobbleAmp = 10 + Math.random() * 20;
          this.stringLen = 40 + Math.random() * 30;
        }
        update() {
          this.y -= this.speed;
          this.wobble += this.wobbleSpeed;
          this.x += Math.sin(this.wobble) * 0.3;
          if (this.y < -100) this.reset();
        }
        draw() {
          const wobbleX = Math.sin(this.wobble) * this.wobbleAmp;
          // String
          ctx.beginPath();
          ctx.moveTo(this.x + wobbleX, this.y + this.r);
          ctx.quadraticCurveTo(this.x + wobbleX + Math.sin(this.wobble*2)*5, this.y + this.r + this.stringLen/2, this.x + wobbleX, this.y + this.r + this.stringLen);
          ctx.strokeStyle = 'rgba(100,100,100,0.3)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Balloon
          const grad = ctx.createRadialGradient(this.x + wobbleX - this.r*0.3, this.y - this.r*0.3, 0, this.x + wobbleX, this.y, this.r);
          grad.addColorStop(0, this.color);
          grad.addColorStop(0.7, this.color);
          grad.addColorStop(1, adjustColor(this.color, -30));
          ctx.beginPath();
          ctx.ellipse(this.x + wobbleX, this.y, this.r * 0.85, this.r, 0, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
          // Highlight
          ctx.beginPath();
          ctx.ellipse(this.x + wobbleX - this.r*0.25, this.y - this.r*0.35, this.r*0.2, this.r*0.12, -0.5, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,255,255,0.35)';
          ctx.fill();
          // Knot
          ctx.beginPath();
          ctx.moveTo(this.x + wobbleX - 4, this.y + this.r);
          ctx.lineTo(this.x + wobbleX + 4, this.y + this.r);
          ctx.lineTo(this.x + wobbleX, this.y + this.r + 8);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        contains(mx, my) {
          const wobbleX = Math.sin(this.wobble) * this.wobbleAmp;
          const dx = mx - (this.x + wobbleX);
          const dy = my - this.y;
          return dx*dx/(this.r*this.r*0.72) + dy*dy/(this.r*this.r) <= 1;
        }
      }

      function adjustColor(hex, amt) {
        const num = parseInt(hex.slice(1), 16);
        const r = Math.max(0, Math.min(255, (num >> 16) + amt));
        const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
        const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
        return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
      }

      function createPopParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
          particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1,
            color,
            size: 2 + Math.random() * 4
          });
        }
      }

      for (let i = 0; i < 12; i++) {
        const b = new Balloon();
        b.y = Math.random() * H;
        balloons.push(b);
      }

      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        for (let i = balloons.length - 1; i >= 0; i--) {
          if (balloons[i].contains(mx, my)) {
            createPopParticles(balloons[i].x, balloons[i].y, balloons[i].color);
            balloons[i].reset();
            poppedCount++;
            document.getElementById('popCount').textContent = poppedCount;
            break;
          }
        }
      });

      function animate() {
        ctx.clearRect(0, 0, W, H);
        balloons.forEach(b => { b.update(); b.draw(); });
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1;
          p.life -= 0.025;
          ctx.globalAlpha = p.life;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          ctx.globalAlpha = 1;
          if (p.life <= 0) particles.splice(i, 1);
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
