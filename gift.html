  <style>
    .gift-stage {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto;
      perspective: 800px;
      cursor: pointer;
    }

    .gift-box {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 60px auto 0;
      transform-style: preserve-3d;
      transition: transform 0.6s var(--ease-out-expo);
    }

    .gift-box:hover { transform: scale(1.05); }

    .gift-face {
      position: absolute;
      width: 160px;
      height: 160px;
      background: linear-gradient(135deg, var(--color-primary), var(--accent-pink));
      border: 2px solid rgba(255,255,255,0.3);
    }

    .gift-face.front { transform: translateZ(80px); }
    .gift-face.back { transform: rotateY(180deg) translateZ(80px); }
    .gift-face.right { transform: rotateY(90deg) translateZ(80px); }
    .gift-face.left { transform: rotateY(-90deg) translateZ(80px); }
    .gift-face.top { transform: rotateX(90deg) translateZ(80px); height: 160px; }
    .gift-face.bottom { transform: rotateX(-90deg) translateZ(80px); height: 160px; }

    .gift-ribbon-v {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 24px; height: 100%;
      background: linear-gradient(180deg, var(--accent-gold), color-mix(in srgb, var(--accent-gold), white 32%), var(--accent-gold));
      box-shadow: inset 0 0 8px rgba(0,0,0,0.1);
    }

    .gift-ribbon-h {
      position: absolute;
      top: 50%; left: 0;
      transform: translateY(-50%);
      width: 100%; height: 24px;
      background: linear-gradient(90deg, var(--accent-gold), color-mix(in srgb, var(--accent-gold), white 32%), var(--accent-gold));
      box-shadow: inset 0 0 8px rgba(0,0,0,0.1);
    }

    .gift-lid {
      position: absolute;
      top: -20px; left: -10px;
      width: 180px; height: 40px;
      background: linear-gradient(135deg, var(--rose-700), var(--color-primary));
      border: 2px solid rgba(255,255,255,0.3);
      transform-origin: back;
      transition: transform 1s var(--ease-out-back);
      transform-style: preserve-3d;
      z-index: 10;
    }

    .gift-lid.unwrapped {
      transform: rotateX(-110deg) translateZ(80px);
    }

    .gift-bow {
      position: absolute;
      top: -30px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 40px;
      z-index: 20;
      transition: all 0.5s var(--ease-out-expo);
    }

    .gift-bow::before, .gift-bow::after {
      content: '';
      position: absolute;
      top: 0;
      width: 30px; height: 40px;
      background: linear-gradient(135deg, var(--accent-gold), color-mix(in srgb, var(--accent-gold), white 32%));
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .gift-bow::before { left: 0; transform: rotate(-20deg); }
    .gift-bow::after { right: 0; transform: rotate(20deg) scaleX(-1); }

    .gift-bow.unwrapped {
      transform: translateX(-50%) translateY(-40px) scale(0.5);
      opacity: 0;
    }

    .gift-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      text-align: center;
      opacity: 0;
      transition: all 0.8s 0.5s var(--ease-out-back);
      z-index: 5;
      pointer-events: none;
    }

    .gift-message.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .gift-message h2 {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
    }

    .gift-message p {
      font-size: var(--text-base);
      color: var(--text-secondary);
      line-height: 2;
    }

    .gift-glow {
      position: absolute;
      inset: -50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--color-primary-rgb), 0.15), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .gift-stage:hover .gift-glow { opacity: 1; }

    @media (max-width: 640px) {
      .gift-stage { transform: scale(0.8); }
    }
  </style>

  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const PALETTE = {
        primary: '#e91e63', pink: '#ff7a9e', purple: '#9d4edd',
        lilac: '#c8b6ff', gold: '#d4a574', lightPink: '#f472b6'
      };

      const stage = document.getElementById('giftStage');
      const lid = document.getElementById('giftLid');
      const bow = document.getElementById('giftBow');
      const msg = document.getElementById('giftMessage');
      let opened = false;

      function openGift() {
        if (opened) return;
        opened = true;
        lid.classList.add('unwrapped');
        bow.classList.add('unwrapped');
        msg.classList.add('show');
        createConfetti();
      }

      stage.addEventListener('click', openGift);
      stage.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openGift(); }
      });

      function createConfetti() {
        const colors = [PALETTE.primary, PALETTE.pink, PALETTE.purple, PALETTE.lilac, PALETTE.gold, PALETTE.lightPink];
        for (let i = 0; i < 120; i++) {
          setTimeout(() => {
            const c = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const sz = 6 + Math.random() * 10;
            c.style.cssText = `
              position: fixed; left: 50%; top: 40%;
              width: ${sz}px; height: ${sz}px;
              background: ${color}; border-radius: ${Math.random()>0.5?'50%':'3px'};
              pointer-events: none; z-index: 1000;
              box-shadow: 0 0 8px ${color};
            `;
            document.body.appendChild(c);
            let x = 0, y = 0, op = 1;
            const a = (Math.random()-0.5)*Math.PI*2;
            const v = 60+Math.random()*180;
            const vx = Math.cos(a)*v, vy = Math.sin(a)*v-100;
            const grav = 100, start = performance.now();
            function anim(now) {
              const dt = Math.min((now-start)/1000,0.032);
              x += vx*dt; y += vy*dt+grav*dt*dt; op -= 0.008;
              c.style.transform = `translate(${x}px,${y}px) rotate(${x*3}deg)`;
              c.style.opacity = op;
              if (op>0) requestAnimationFrame(anim); else c.remove();
            }
            requestAnimationFrame(anim);
          }, i*10);
        }
      }
    })();
  </script>
