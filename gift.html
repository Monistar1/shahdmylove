<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/core.css">
  <style>
    html, body {
      margin: 0;
      overflow-x: hidden;
      background: radial-gradient(
        circle at top,
        #f7bdff,
        #cf99d7,
        #f0e0e8
      );
    }

    .gift-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .gift-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: calc(100% + 26px);
      left: 50%;
      right: auto;
      width: max-content;
      max-width: min(500px, 90vw);
      padding: 50px 25px;
      box-sizing: border-box;
      z-index: 1;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 25px;
      border: 4px solid rgba(232, 113, 248, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    /* Stay horizontally centered during reveal entrance and after */
    .gift-container.reveal {
      transform: translateX(-50%) translateY(50px);
    }

    .gift-container.reveal.visible {
      transform: translateX(-50%) translateY(0);
      animation: floatGift 6s ease-in-out infinite;
    }

    @keyframes floatGift {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-15px); }
    }

    .luxury-btn {
      background: linear-gradient(135deg, #cf99d7, #f7bdff);
      border: none;
      padding: 15px 32px;
      border-radius: 50px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      font-family: var(--font-body, 'Cairo', sans-serif);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      transition: 0.3s ease;
      margin-top: 24px;
    }

    .luxury-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
    }

    .luxury-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .romantic-note {
      font-family: var(--font-display);
      direction: rtl;
      font-size: 30px;
      color: rgba(255, 240, 250, 0.95);
      text-shadow: 0 0 10px rgba(255, 150, 200, 0.35);
      line-height: 1.4;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .romantic-heart {
      font-size: 26px;
      margin-top: 10px;
      text-align: center;
      line-height: 1;
    }

    .romantic-note br {
      display: none;
    }

    .gift-stage {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto;
      perspective: 800px;
      cursor: pointer;
    }

    /* Floating gift wrapper */
    .gift-object {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 60px auto 0;
      animation: floatLuxury 5s ease-in-out infinite;
      transform-style: preserve-3d;
    }

    /* Luxury cinematic gift box */
    .gift-box {
      position: relative;
      width: 180px;
      height: 180px;
      background: linear-gradient(135deg, #f7bdff, #cf99d7);
      border-radius: 22px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.18),
        inset 0 2px 12px rgba(255, 255, 255, 0.5),
        0 0 40px rgba(255, 180, 220, 0.35);
      transform: perspective(800px) rotateX(5deg);
      transform-style: preserve-3d;
      transition: transform 0.6s var(--ease-out-expo);
      animation: giftGlow 3s ease-in-out infinite;
      overflow: hidden;
    }

    .gift-box:hover { transform: perspective(800px) rotateX(5deg) scale(1.05); }

    /* Premium glass ribbon */
    .gift-ribbon-v {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 26px; height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.15), rgba(255,255,255,0.55));
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: inset 0 0 12px rgba(255,255,255,0.3);
      z-index: 2;
    }

    .gift-ribbon-h {
      position: absolute;
      top: 50%; left: 0;
      transform: translateY(-50%);
      width: 100%; height: 26px;
      background: linear-gradient(90deg, rgba(255,255,255,0.55), rgba(255,255,255,0.15), rgba(255,255,255,0.55));
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: inset 0 0 12px rgba(255,255,255,0.3);
      z-index: 2;
    }

    /* Premium light reflection */
    .gift-box::after {
      content: "";
      position: absolute;
      top: -25%; left: -25%;
      width: 150%; height: 150%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: rotate(25deg);
      animation: shine 4s infinite;
      pointer-events: none;
      z-index: 3;
    }

    /* Luxury lid */
    .gift-lid {
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      width: 192px; height: 46px;
      background: linear-gradient(135deg, #ff9ec8, #e91e63);
      border-radius: 16px 16px 8px 8px;
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow:
        0 10px 25px rgba(0,0,0,0.15),
        inset 0 2px 10px rgba(255,255,255,0.35);
      transform-origin: center bottom;
      transition: transform 1s var(--ease-out-back);
      transform-style: preserve-3d;
      z-index: 10;
    }

    .gift-lid.unwrapped {
      transform: translateX(-50%) rotateX(-110deg) translateZ(80px);
    }

    /* Premium bow */
    .gift-bow {
      position: absolute;
      top: -24px; left: 50%;
      transform: translateX(-50%);
      width: 72px; height: 46px;
      z-index: 20;
      transition: all 0.5s var(--ease-out-expo);
    }

    .gift-bow::before, .gift-bow::after {
      content: '';
      position: absolute;
      top: 0;
      width: 36px; height: 46px;
      background: linear-gradient(135deg, #ffd700, #ffecb3, #d4a574);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    .gift-bow::before { left: 0; transform: rotate(-25deg); }
    .gift-bow::after { right: 0; transform: rotate(25deg) scaleX(-1); }

    .gift-bow.unwrapped {
      transform: translateX(-50%) translateY(-55px) scale(0.5);
      opacity: 0;
    }

    /* Luxury message card */
    .gift-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 240px;
      padding: 25px;
      box-sizing: border-box;
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      opacity: 0;
      transition: all 0.8s 0.5s var(--ease-out-back);
      z-index: 5;
      pointer-events: none;
      font-family: "Cairo", "Amiri", "Noto Kufi Arabic", sans-serif;
      direction: rtl;
    }

    .gift-message.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .gift-message h2 {
      font-size: 30px;
      margin-bottom: 10px;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(255, 180, 220, 0.6);
    }

    .gift-message p {
      font-size: 20px;
      color: rgba(255, 240, 250, 0.95);
      text-shadow: 0 0 12px rgba(255, 150, 200, 0.4);
      line-height: 1.8;
    }

    .gift-glow {
      position: absolute;
      inset: -50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--color-primary-rgb), 0.15), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .gift-stage:hover .gift-glow { opacity: 1; }

    @keyframes floatLuxury {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }

    @keyframes giftGlow {
      0%, 100% {
        box-shadow:
          0 25px 60px rgba(0,0,0,0.18),
          inset 0 2px 12px rgba(255,255,255,0.5),
          0 0 40px rgba(255, 180, 220, 0.35);
      }
      50% {
        box-shadow:
          0 30px 70px rgba(0,0,0,0.22),
          inset 0 2px 14px rgba(255,255,255,0.55),
          0 0 60px rgba(255, 180, 220, 0.6);
      }
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(25deg); }
      100% { transform: translateX(100%) rotate(25deg); }
    }

    @media (max-width: 640px) {
      .gift-stage { transform: scale(0.8); }
    }
  </style>
</head>

  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const PALETTE = {
        primary: '#e91e63', pink: '#ff7a9e', purple: '#9d4edd',
        lilac: '#c8b6ff', gold: '#d4a574', lightPink: '#f472b6'
      };

      const stage = document.getElementById('giftStage');
      const lid = document.getElementById('giftLid');
      const bow = document.getElementById('giftBow');
      const msg = document.getElementById('giftMessage');
      const openBtn = document.getElementById('openGiftBtn');
      let opened = false;

      function openGift() {
        if (opened) return;
        opened = true;
        lid.classList.add('unwrapped');
        bow.classList.add('unwrapped');
        msg.classList.add('show');
        if (openBtn) {
          openBtn.disabled = true;
          openBtn.textContent = 'مفتوحة بكل حب 💖';
        }
        createConfetti();
      }

      stage.addEventListener('click', openGift);
      stage.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openGift(); }
      });
      if (openBtn) openBtn.addEventListener('click', openGift);

      function createConfetti() {
        const colors = [PALETTE.primary, PALETTE.pink, PALETTE.purple, PALETTE.lilac, PALETTE.gold, PALETTE.lightPink];
        for (let i = 0; i < 120; i++) {
          setTimeout(() => {
            const c = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const sz = 6 + Math.random() * 10;
            c.style.cssText = `
              position: fixed; left: 50%; top: 40%;
              width: ${sz}px; height: ${sz}px;
              background: ${color}; border-radius: ${Math.random()>0.5?'50%':'3px'};
              pointer-events: none; z-index: 1000;
              box-shadow: 0 0 8px ${color};
            `;
            document.body.appendChild(c);
            let x = 0, y = 0, op = 1;
            const a = (Math.random()-0.5)*Math.PI*2;
            const v = 60+Math.random()*180;
            const vx = Math.cos(a)*v, vy = Math.sin(a)*v-100;
            const grav = 100, start = performance.now();
            function anim(now) {
              const dt = Math.min((now-start)/1000,0.032);
              x += vx*dt; y += vy*dt+grav*dt*dt; op -= 0.008;
              c.style.transform = `translate(${x}px,${y}px) rotate(${x*3}deg)`;
              c.style.opacity = op;
              if (op>0) requestAnimationFrame(anim); else c.remove();
            }
            requestAnimationFrame(anim);
          }, i*10);
        }
      }

      // Subtle romantic light orbs background
      (function initAmbientParticles() {
        const pCanvas = document.getElementById('giftParticles');
        if (!pCanvas) return;
        const pCtx = pCanvas.getContext('2d');
        let W, H;
        const orbs = [];
        const MAX_ORBS = 30;

        function resizeParticles() {
          W = pCanvas.width = window.innerWidth;
          H = pCanvas.height = window.innerHeight;
        }
        resizeParticles();
        window.addEventListener('resize', resizeParticles);

        class Orb {
          constructor() {
            this.reset();
            this.y = Math.random() * H;
          }
          reset() {
            this.x = Math.random() * W;
            this.y = H + Math.random() * 60;
            this.size = Math.random() * 5 + 2;
            this.speed = Math.random() * 0.4 + 0.2;
            this.alpha = Math.random() * 0.15 + 0.08;
            this.hue = Math.random() * 40 + 300;
          }
          update() {
            this.y -= this.speed;
            if (this.y < -30) this.reset();
          }
          draw() {
            pCtx.globalAlpha = this.alpha;
            pCtx.fillStyle = `hsl(${this.hue}, 85%, 85%)`;
            pCtx.beginPath();
            pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            pCtx.fill();
          }
        }

        for (let i = 0; i < MAX_ORBS; i++) orbs.push(new Orb());

        let pRafId;
        function loop() {
          pCtx.clearRect(0, 0, W, H);
          pCtx.globalCompositeOperation = 'lighter';
          for (let i = 0; i < orbs.length; i++) {
            orbs[i].update();
            orbs[i].draw();
          }
          pCtx.globalAlpha = 1;
          pRafId = requestAnimationFrame(loop);
        }
        loop();

        document.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            cancelAnimationFrame(pRafId);
          } else {
            loop();
          }
        });
      })();
    })();
  </script>
</body>
</html>
