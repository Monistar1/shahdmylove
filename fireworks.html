    html, body {
      margin: 0;
      background: radial-gradient(
        circle at top,
        #f7bdff,
        #cf99d7,
        #f0e0e8
      );
    }

    @media (min-width: 769px) {
      html, body { overflow: hidden; }
    }

    @media (max-width: 768px) {
      html, body { overflow-x: hidden; overflow-y: auto; }
    }

    .fireworks-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      cursor: crosshair;
    }

    .fireworks-overlay {
      position: relative;
      z-index: 10;
      pointer-events: none;
      text-align: center;
      padding-bottom: 80px;
    }
    .fireworks-overlay > * { pointer-events: auto; }

    .cinematic-nav {
      position: fixed !important;
      top: auto !important;
      bottom: 0 !important;
      left: 0 !important;
      width: 100% !important;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .memory-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .memory-text {
      position: absolute;
      font-family: 'Cairo', 'Amiri', 'Noto Kufi Arabic', sans-serif;
      font-size: 22px;
      color: rgba(255, 235, 245, 0.95);
      text-shadow: 0 0 18px rgba(255, 120, 180, 0.6);
      letter-spacing: 0.5px;
      direction: rtl;
      text-align: center;
      white-space: nowrap;
      transform: translate(-50%, 0);
      animation: floatFade 5s ease-in-out forwards;
    }

    @media (max-width: 768px) {
      .memory-text {
        font-size: 17px;
        white-space: normal;
        max-width: 80vw;
      }
    }

    @keyframes floatFade {
      0% {
        opacity: 0;
        transform: translate(-50%, 20px);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -90px);
      }
    }
  </style>

  <main id="main-content" class="page-wrapper fireworks-overlay">
    <h1 class="display-title display-title--1 text-gradient-purple reveal">ألعاب نارية لكِ</h1>
    <p class="reveal reveal-delay-1" style="color: var(--text-muted); font-size: var(--text-sm);">اضغط في أي مكان لإطلاق الألعاب النارية</p>

  <div id="memoryContainer" class="memory-container" aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/self-evolve.js"></script>
  <script src="js/engine3d.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/core.js"></script>
  <script src="js/narrative.js"></script>
  <script src="js/fps.js"></script>
  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';

      // Hard lock: prevent duplicate animation loops
      if (window.__FIREWORKS_PAGE_RUNNING__) return;
      window.__FIREWORKS_PAGE_RUNNING__ = true;

      // Auth guard only — skip heavy 3D background on this page
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const canvas = document.getElementById('fireworksCanvas');
      const ctx = canvas.getContext('2d');
      const memoryContainer = document.getElementById('memoryContainer');
      let rafId = null;
      let isRunning = false;
      let flashOpacity = 0;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const MAX_PARTICLES = 400;
      const AMBIENT_COUNT = 35;
      const particles = [];

      const memories = [
        "إلى شودي… كل هذا الضوء يشبهكِ أكثر مما أستطيع وصفه",
        "يا شودي، في كل انفجار أراكِ كأنكِ اللحظة الأجمل في حياتي",
        "لا شيء في هذا العالم يشبه حضوركِ في قلبي يا شودي",
        "كل نجمة تنفجر هنا… هي كلمة لم أقلها لكِ بعد يا شودي",
        "أنتِ يا شودي لستِ ذكرى… أنتِ الشعور الذي لا ينتهي",
        "في عالمٍ آخر، كنتِ ستكونين البداية والنهاية يا شودي"
      ];

      function randomHue() {
        return Math.random() * 360;
      }

      function makeColors() {
        const hue = randomHue();
        return {
          core: `hsl(${hue}, 100%, 70%)`,
          glow: `hsla(${hue}, 100%, 80%, 0.4)`,
          trail: `hsl(${hue}, 90%, 75%)`
        };
      }

      class Particle {
        constructor(x, y, type, colors) {
          this.type = type;
          this.x = x;
          this.y = y;
          this.depth = Math.random();
          this.history = [];

          const angle = Math.random() * Math.PI * 2;

          if (type === 'core') {
            const speed = Math.random() * 4 + 3;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 75;
            this.maxLife = 75;
            this.size = Math.random() * 4 + 2;
            this.color = colors.core;
            this.alpha = 1;
          } else if (type === 'glow') {
            const speed = Math.random() * 2.2 + 0.8;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 60;
            this.maxLife = 60;
            this.size = Math.random() * 10 + 8;
            this.color = colors.glow;
            this.alpha = 0.4;
          } else if (type === 'trail') {
            const speed = Math.random() * 5.5 + 3;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 50;
            this.maxLife = 50;
            this.size = Math.random() * 2 + 1;
            this.color = colors.trail;
            this.alpha = 0.95;
          } else if (type === 'ambient') {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 120;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = -Math.random() * 0.5 - 0.2;
            this.life = 1000;
            this.maxLife = 1000;
            this.size = Math.random() * 6 + 4;
            this.color = `hsla(${Math.random() * 50 + 300}, 90%, 85%, 0.18)`;
            this.alpha = 0.18;
          }
        }

        update() {
          if (this.type !== 'ambient') {
            this.history.push({ x: this.x, y: this.y });
            if (this.history.length > 6) this.history.shift();
          }

          this.x += this.vx;
          this.y += this.vy;

          if (this.type !== 'ambient') {
            this.vy += 0.05;
            this.vx *= 0.985;
          }

          this.life--;

          if (this.type === 'ambient' && this.y < -30) {
            this.y = canvas.height + Math.random() * 60;
            this.x = Math.random() * canvas.width;
            this.life = this.maxLife;
          }
        }

        draw() {
          const depthScale = 0.55 + this.depth * 0.45;
          const lifeRatio = Math.max(0, this.life / this.maxLife);
          const alpha = this.alpha * (0.5 + this.depth * 0.5) * lifeRatio;

          ctx.globalAlpha = alpha;

          if (this.type === 'trail' && this.history.length > 1) {
            ctx.strokeStyle = this.color;
            ctx.lineWidth = this.size * depthScale;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(this.history[0].x, this.history[0].y);
            for (let i = 1; i < this.history.length; i++) {
              ctx.lineTo(this.history[i].x, this.history[i].y);
            }
            ctx.lineTo(this.x, this.y);
            ctx.stroke();
          } else {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * depthScale, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function spawnAmbient() {
        for (let i = 0; i < AMBIENT_COUNT && particles.length < MAX_PARTICLES; i++) {
          const p = new Particle(0, 0, 'ambient');
          p.y = Math.random() * canvas.height;
          particles.push(p);
        }
      }

      function explode(x, y) {
        if (particles.length >= MAX_PARTICLES) return;

        flashOpacity = 0.15;
        const colors = makeColors();

        for (let i = 0; i < 20 && particles.length < MAX_PARTICLES; i++) {
          particles.push(new Particle(x, y, 'core', colors));
        }
        for (let i = 0; i < 10 && particles.length < MAX_PARTICLES; i++) {
          particles.push(new Particle(x, y, 'glow', colors));
        }
        for (let i = 0; i < 15 && particles.length < MAX_PARTICLES; i++) {
          particles.push(new Particle(x, y, 'trail', colors));
        }

        spawnMemoryText(x, y);
      }

      function spawnMemoryText(x, y) {
        if (!memoryContainer) return;
        const el = document.createElement('div');
        el.className = 'memory-text';
        el.textContent = memories[Math.floor(Math.random() * memories.length)];
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const minX = Math.min(80, vw * 0.2);
        const maxX = Math.max(vw - 80, vw * 0.8);
        el.style.left = Math.max(minX, Math.min(x, maxX)) + 'px';
        el.style.top = Math.min(Math.max(y, 60), vh * 0.85) + 'px';
        memoryContainer.appendChild(el);
        setTimeout(() => {
          if (el.parentNode) el.parentNode.removeChild(el);
        }, 5000);
      }

      function animate() {
        rafId = null;
        if (document.hidden) return;

        ctx.globalCompositeOperation = 'source-over';
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Cinematic explosion flash
        if (flashOpacity > 0) {
          ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          flashOpacity -= 0.006;
        }

        ctx.globalCompositeOperation = 'lighter';

        // Living ambient light orbs
        ctx.shadowBlur = 0;
        for (let i = 0; i < particles.length; i++) {
          if (particles[i].type === 'ambient') particles[i].draw();
        }

        // Glow halo layer with strong cinematic glow
        ctx.shadowBlur = 25;
        for (let i = 0; i < particles.length; i++) {
          if (particles[i].type === 'glow') {
            ctx.shadowColor = particles[i].color;
            particles[i].draw();
          }
        }

        // Core burst layer
        ctx.shadowBlur = 18;
        for (let i = 0; i < particles.length; i++) {
          if (particles[i].type === 'core') {
            ctx.shadowColor = particles[i].color;
            particles[i].draw();
          }
        }

        // Spark trails without glow
        ctx.shadowBlur = 0;
        for (let i = 0; i < particles.length; i++) {
          if (particles[i].type === 'trail') particles[i].draw();
        }

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          if (particles[i].life <= 0 && particles[i].type !== 'ambient') {
            particles.splice(i, 1);
          }
        }

        rafId = requestAnimationFrame(animate);
      }

      function start() {
        if (isRunning) return;
        isRunning = true;
        if (!rafId) rafId = requestAnimationFrame(animate);
      }

      function stop() {
        isRunning = false;
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      function cleanup() {
        stop();
        window.removeEventListener('resize', resize);
        window.removeEventListener('visibilitychange', handleVisibility);
        window.removeEventListener('pagehide', cleanup);
        canvas.removeEventListener('click', onClick);
        canvas.removeEventListener('touchstart', onTouch);
        if (memoryContainer) memoryContainer.innerHTML = '';
        window.__FIREWORKS_PAGE_RUNNING__ = false;
      }

      function handleVisibility() {
        if (document.hidden) {
          stop();
        } else if (isRunning) {
          start();
        }
      }

      function onClick(e) {
        explode(e.clientX, e.clientY);
      }

      function onTouch(e) {
        e.preventDefault();
        const touch = e.touches[0];
        explode(touch.clientX, touch.clientY);
      }

      spawnAmbient();

      canvas.addEventListener('click', onClick);
      canvas.addEventListener('touchstart', onTouch, { passive: false });

      window.addEventListener('visibilitychange', handleVisibility);
      window.addEventListener('pagehide', cleanup, { once: true });

      start();
    })();
  </script>
