    <h1 class="display-title display-title--1 text-gradient-purple reveal">ألعاب نارية لكِ</h1>
    <p class="reveal reveal-delay-1" style="color: var(--text-muted); font-size: var(--text-sm);">اضغط في أي مكان لإطلاق الألعاب النارية</p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/engine3d.js"></script>
  <script src="js/auth.js"></script>

  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const canvas = document.getElementById('fireworksCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      let fireworks = [];
      let sparks = [];
      const PALETTE = {
        primary: '#e91e63', pink: '#ff7a9e', purple: '#9d4edd',
        lilac: '#c8b6ff', gold: '#d4a574', lightPink: '#f472b6', rose: '#fb7185', paleGold: '#fcd34d'
      };
      const colors = [PALETTE.primary, PALETTE.pink, PALETTE.purple, PALETTE.lilac, PALETTE.gold, PALETTE.lightPink, PALETTE.rose, PALETTE.paleGold];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      class Firework {
        constructor(tx, ty) {
          this.x = Math.random() * W;
          this.y = H;
          this.tx = tx || Math.random() * W;
          this.ty = ty || H * 0.2 + Math.random() * H * 0.3;
          this.vx = (this.tx - this.x) / 80;
          this.vy = (this.ty - H) / 80 - 3;
          this.life = 80;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.exploded = false;
        }
        update() {
          if (this.exploded) return true;
          this.x += this.vx;
          this.y += this.vy;
          this.vy += 0.08;
          this.life--;
          if (this.life <= 0 || this.vy >= 0) {
            this.explode();
            return true;
          }
          return false;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = this.color;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        explode() {
          const count = 40 + Math.floor(Math.random() * 30);
          for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
            const v = 2 + Math.random() * 4;
            sparks.push({
              x: this.x, y: this.y,
              vx: Math.cos(a) * v,
              vy: Math.sin(a) * v,
              life: 1,
              decay: 0.008 + Math.random() * 0.012,
              color: this.color,
              size: 2 + Math.random() * 2,
              gravity: 0.03
            });
          }
        }
      }

      function launchFirework(x, y) {
        fireworks.push(new Firework(x, y));
      }

      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        launchFirework(e.clientX - rect.left, e.clientY - rect.top);
      });

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        launchFirework(touch.clientX, touch.clientY);
      });

      setInterval(() => {
        if (Math.random() < 0.4) launchFirework();
      }, 800);

      function animate() {
        ctx.fillStyle = 'rgba(250, 240, 244, 0.15)';
        ctx.fillRect(0, 0, W, H);

        for (let i = fireworks.length - 1; i >= 0; i--) {
          if (fireworks[i].update()) fireworks.splice(i, 1);
          else fireworks[i].draw();
        }

        for (let i = sparks.length - 1; i >= 0; i--) {
          const s = sparks[i];
          s.x += s.vx;
          s.y += s.vy;
          s.vy += s.gravity;
          s.vx *= 0.98;
          s.life -= s.decay;
          ctx.globalAlpha = Math.max(0, s.life);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
          ctx.fillStyle = s.color;
          ctx.shadowBlur = 6;
          ctx.shadowColor = s.color;
          ctx.fill();
          ctx.shadowBlur = 0;
          if (s.life <= 0) sparks.splice(i, 1);
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
