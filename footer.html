    .footer-heart {
      width: 100px; height: 100px;
      color: var(--accent-rose);
      filter: drop-shadow(0 0 30px rgba(var(--color-primary-rgb), 0.3));
      animation: heartBeat 2s ease-in-out infinite;
    }
    .days-counter {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: 800;
      color: var(--accent-rose);
      text-shadow: 0 0 20px rgba(var(--color-primary-rgb), 0.15);
    }
    .days-label {
      font-size: var(--text-lg);
      color: var(--text-secondary);
    }
    .quote-rotate {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--text-primary);
      line-height: 1.6;
      text-align: center;
      min-height: 3em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kiss-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-rose), var(--accent-pink));
      border: none;
      color: var(--text-on-accent);
      font-size: 2rem;
      cursor: pointer;
      box-shadow: var(--shadow-glow-rose);
      transition: transform var(--duration-fast);
      position: relative;
    }
    .kiss-btn:hover { transform: scale(1.1); }
    .kiss-btn:active { transform: scale(0.95); }
    .signature {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--text-muted);
      font-style: italic;
    }
    .signature-line {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-rose), transparent);
      margin: var(--space-sm) auto;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      const START_DATE = new Date('2026-01-01T00:00:00');
      const quotes = [
        "أحبكِ أكثر مما تتخيلين",
        "أنتِ نبضة القلب التي لا تتوقف",
        "كل لحظة معكِ هي كنز",
        "إلى الأبد يا حبيبتي",
        "أنتِ ضوء القمر في لياليّ",
        "قلبي ملككِ اليوم وغداً"
      ];

      function updateDays() {
        const days = Math.floor((Date.now() - START_DATE) / 86400000);
        const el = document.getElementById('daysCounter');
        if (el) el.textContent = Math.max(0, days).toLocaleString('ar-SA');
      }
      updateDays();

      let quoteIdx = 0;
      const quoteEl = document.getElementById('quoteRotate');
      function rotateQuote() {
        if (!quoteEl) return;
        quoteEl.style.opacity = '0';
        setTimeout(() => {
          quoteEl.textContent = quotes[quoteIdx];
          quoteEl.style.opacity = '1';
          quoteIdx = (quoteIdx + 1) % quotes.length;
        }, 500);
      }
      rotateQuote();
      setInterval(rotateQuote, 5000);

      document.getElementById('kissBtn').addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        for (let i = 0; i < 12; i++) {
          const heart = document.createElement('div');
          heart.textContent = '💋';
          heart.style.cssText = `
            position: fixed; left: ${rect.left + rect.width/2}px; top: ${rect.top}px;
            font-size: ${16 + Math.random()*12}px; pointer-events: none; z-index: 1000;
          `;
          document.body.appendChild(heart);
          let x = 0, y = 0, op = 1;
          const a = (Math.random()-0.5)*Math.PI;
          const v = 30 + Math.random()*60;
          const vx = Math.cos(a)*v, vy = Math.sin(a)*v - 80;
          const start = performance.now();
          function anim(now) {
            const dt = Math.min((now-start)/1000, 0.032);
            x += vx*dt; y += vy*dt; op -= 0.015;
            heart.style.transform = `translate(${x}px,${y}px)`;
            heart.style.opacity = op;
            if (op > 0) requestAnimationFrame(anim); else heart.remove();
          }
          requestAnimationFrame(anim);
        }
      });
    })();
  </script>
