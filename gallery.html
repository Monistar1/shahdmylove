  <style>
    :root {
      --safe-left: env(safe-area-inset-left, 0px);
    }

    /* ── Cinematic Video Frame ── */
    .cinematic-video-frame {
      width: 90%;
      max-width: 800px;
      margin: var(--space-lg) auto;
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #0a0a0a;
      box-shadow: 0 12px 48px color-mix(in srgb, var(--accent-rose) 16%, transparent),
                  0 0 0 1px color-mix(in srgb, var(--accent-pink) 20%, transparent) inset;
      border: 1px solid color-mix(in srgb, var(--accent-pink) 25%, transparent);
      transition: box-shadow var(--duration-base), transform var(--duration-base);
    }

    .cinematic-video-frame:hover {
      box-shadow: 0 16px 56px color-mix(in srgb, var(--accent-rose) 24%, transparent),
                  0 0 0 1px color-mix(in srgb, var(--accent-pink) 35%, transparent) inset;
      transform: translateY(-2px);
    }

    .cinematic-video {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      display: block;
      background: #0a0a0a;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity var(--duration-base) var(--ease-smooth),
                  background var(--duration-base) var(--ease-smooth);
      cursor: pointer;
    }

    .cinematic-video-frame.playing .video-overlay {
      opacity: 0;
      pointer-events: none;
      background: transparent;
    }

    .video-play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform var(--duration-base) var(--ease-out-expo),
                  background var(--duration-base),
                  border-color var(--duration-base);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .video-play-btn:hover {
      transform: scale(1.12);
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.55);
    }

    .video-play-btn svg {
      width: 30px;
      height: 30px;
      fill: #fff;
      margin-right: -3px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    /* ── Fullscreen Exit Button ── */
    .video-exit-btn {
      position: absolute;
      top: var(--space-4);
      left: var(--space-4);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--duration-base) var(--ease-smooth),
                  visibility var(--duration-base),
                  background var(--duration-base),
                  transform var(--duration-base);
      z-index: 10;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }

    .cinematic-video-frame.is-fullscreen .video-exit-btn,
    .cinematic-video-frame:fullscreen .video-exit-btn,
    .cinematic-video-frame:-webkit-full-screen .video-exit-btn {
      opacity: 1;
      visibility: visible;
    }

    .video-exit-btn:hover {
      background: rgba(0, 0, 0, 0.55);
      border-color: rgba(255, 255, 255, 0.45);
      transform: scale(1.1);
    }

    .video-exit-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ── Masonry Gallery ── */
    .gallery-masonry {
      width: 100%;
      max-width: 960px;
      columns: 1;
      column-gap: var(--space-md);
    }

    @media (min-width: 480px) { .gallery-masonry { columns: 2; } }
    @media (min-width: 768px) { .gallery-masonry { columns: 3; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: var(--space-md);
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: zoom-in;
      background: color-mix(in srgb, var(--accent-pink) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent-pink) 18%, transparent);
      opacity: 0;
      transition: opacity 0.5s var(--ease-smooth), transform var(--duration-base) var(--ease-out-expo),
                  border-color var(--duration-base),
                  box-shadow var(--duration-base);
      will-change: transform, opacity;
      contain: layout paint;
    }

    .gallery-item.revealed { opacity: 1; }

    .gallery-item:hover {
      transform: translateY(-6px) scale(1.015);
      border-color: color-mix(in srgb, var(--accent-pink) 45%, transparent);
      box-shadow: 0 12px 40px color-mix(in srgb, var(--accent-rose) 18%, transparent);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform var(--duration-slow) var(--ease-out-expo),
                  filter var(--duration-base),
                  opacity var(--duration-base);
    }

    .gallery-item:hover img { transform: scale(1.05); }

    .img-blur { filter: blur(12px); opacity: 0.6; }
    .img-loaded { filter: blur(0); opacity: 1; }

    /* ── Caption ── */
    .item-caption {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: var(--space-md);
      background: linear-gradient(to top, color-mix(in srgb, var(--text-primary) 72%, transparent) 0%, color-mix(in srgb, var(--text-primary) 25%, transparent) 50%, transparent 100%);
      opacity: 0;
      transition: opacity var(--duration-base) var(--ease-smooth);
      pointer-events: none;
      text-align: center;
    }

    .gallery-item:hover .item-caption { opacity: 1; }

    .item-caption-title {
      font-family: var(--font-display);
      font-size: var(--text-base);
      color: var(--text-on-accent);
      margin-bottom: var(--space-1);
    }

    .item-caption-date {
      font-size: var(--text-xs);
      color: var(--surface-65);
    }

    /* ── Lightbox ── */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      background: rgba(var(--color-bg-dark-rgb), 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--duration-base), visibility 0s var(--duration-base);
    }

    .lightbox-overlay.show {
      opacity: 1;
      visibility: visible;
      transition: opacity var(--duration-base), visibility 0s;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      transform: scale(0.9);
      transition: transform var(--duration-base) var(--ease-out-back);
    }

    .lightbox-overlay.show .lightbox-img {
      transform: scale(1);
    }

    .lightbox-close {
      position: absolute;
      top: var(--space-6);
      left: var(--space-6);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface-25);
      border: 1px solid var(--surface-50);
      color: var(--text-on-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--duration-fast);
      z-index: calc(var(--z-modal) + 1);
    }

    .lightbox-close:hover { background: var(--surface-50); }

    .lightbox-caption {
      position: absolute;
      bottom: var(--space-8);
      left: 0;
      right: 0;
      text-align: center;
      color: var(--surface-80);
      font-size: var(--text-sm);
      padding: var(--space-2);
    }
  </style>
</head>

  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();

      /* ── Auth Guard ── */
      if (window.AuthSystem) AuthSystem.guard();

      /* ── Random Photo Gallery ── */
      const photos = [
        { src: 'assets/photos/shody.png', alt: 'شودي', caption: 'شودي', date: 'ذاكرة جميلة' },
        { src: 'assets/photos/shody1.png', alt: 'شودي', caption: 'شودي', date: 'لحظة سعيدة' },
        { src: 'assets/photos/shody2.png', alt: 'شودي', caption: 'شودي', date: 'ابتسامة دافئة' },
        { src: 'assets/photos/shody3.png', alt: 'شودي', caption: 'شودي', date: 'يوم مميز' },
        { src: 'assets/photos/shody4.png', alt: 'شودي', caption: 'شودي', date: 'ذكرى لا تُنسى' },
        { src: 'assets/photos/shody5.png', alt: 'شودي', caption: 'شودي', date: 'أجمل يوم' }
      ];

      function shuffle(array) {
        const items = array.slice();
        for (let i = items.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }
        return items;
      }

      function renderGallery() {
        const container = document.getElementById('galleryMasonry');
        if (!container) return;
        const shuffled = shuffle(photos);
        container.innerHTML = shuffled.map(photo => `
          <div class="gallery-item" data-caption="${photo.caption}">
            <img src="${photo.src}" alt="${photo.alt}" loading="lazy" class="img-blur" onload="this.classList.add('img-loaded'); this.classList.remove('img-blur');">
            <div class="item-caption">
              <span class="item-caption-title">${photo.caption}</span>
              <span class="item-caption-date">${photo.date}</span>
            </div>
          </div>
        `).join('');
      }

      renderGallery();

      /* ── Staggered reveal ── */
      (function revealItems() {
        const container = document.getElementById('galleryMasonry');
        if (!container) return;
        const items = container.querySelectorAll('.gallery-item');
        items.forEach((item, i) => {
          setTimeout(() => item.classList.add('revealed'), i * 60);
        });
        items.forEach(item => {
          const img = item.querySelector('img');
          if (img && img.complete) {
            img.classList.add('img-loaded');
            img.classList.remove('img-blur');
          }
        });
      })();

      /* ── Lightbox ── */
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxCaption = document.getElementById('lightboxCaption');
      const lightboxClose = document.getElementById('lightboxClose');

      function openLightbox(item) {
        const img = item.querySelector('img');
        if (!img) return;
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt || '';
        lightboxCaption.textContent = item.dataset.caption || '';
        lightbox.classList.add('show');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('show');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        setTimeout(() => { lightboxImg.src = ''; }, 300);
      }

      document.getElementById('galleryMasonry').addEventListener('click', (e) => {
        const item = e.target.closest('.gallery-item');
        if (item) openLightbox(item);
      });

      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

      /* ── Cinematic Video Player ── */
      const cinematicVideoFrame = document.getElementById('cinematicVideoFrame');
      const cinematicVideo = document.getElementById('cinematicVideo');
      const videoPlayBtn = document.getElementById('videoPlayBtn');
      const videoOverlay = document.getElementById('videoOverlay');

      function enterFullscreen(element) {
        const target = element || cinematicVideoFrame;
        if (target.requestFullscreen) {
          return target.requestFullscreen();
        }
        if (target.webkitRequestFullscreen) {
          return target.webkitRequestFullscreen();
        }
        if (target.msRequestFullscreen) {
          return target.msRequestFullscreen();
        }
        if (cinematicVideo && cinematicVideo.webkitEnterFullscreen) {
          cinematicVideo.webkitEnterFullscreen();
          return Promise.resolve();
        }
        return Promise.reject('Fullscreen not supported');
      }

      function isFullscreen() {
        return !!(document.fullscreenElement ||
                  document.webkitFullscreenElement ||
                  document.msFullscreenElement);
      }

      function playVideo() {
        if (!cinematicVideo || !cinematicVideoFrame) return;
        cinematicVideo.play().then(() => {
          cinematicVideoFrame.classList.add('playing');
          return enterFullscreen(cinematicVideoFrame).catch(() => {
            // Fullscreen blocked or unsupported, but video still plays
          });
        }).catch(err => {
          console.warn('Video playback failed:', err);
        });
      }

      function pauseVideo() {
        if (!cinematicVideo) return;
        cinematicVideo.pause();
        cinematicVideoFrame.classList.remove('playing');
      }

      if (videoPlayBtn && videoOverlay && cinematicVideo) {
        videoPlayBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          playVideo();
        });

        videoOverlay.addEventListener('click', () => {
          if (cinematicVideo.paused) {
            playVideo();
          } else {
            pauseVideo();
          }
        });
      }

      if (cinematicVideo) {
        cinematicVideo.addEventListener('click', () => {
          if (cinematicVideo.paused) {
            playVideo();
          } else {
            pauseVideo();
          }
        });

        cinematicVideo.addEventListener('play', () => {
          cinematicVideoFrame.classList.add('playing');
        });

        cinematicVideo.addEventListener('pause', () => {
          cinematicVideoFrame.classList.remove('playing');
        });

        cinematicVideo.addEventListener('ended', () => {
          cinematicVideoFrame.classList.remove('playing');
        });
      }

      function updateFullscreenUI() {
        if (cinematicVideoFrame) {
          cinematicVideoFrame.classList.toggle('is-fullscreen', isFullscreen());
        }
      }

      function exitFullscreen() {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }

      function handleFullscreenChange() {
        updateFullscreenUI();
        if (!isFullscreen() && cinematicVideo && !cinematicVideo.paused) {
          pauseVideo();
        }
      }

      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
      document.addEventListener('msfullscreenchange', handleFullscreenChange);

      if (videoExitBtn) {
        videoExitBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          exitFullscreen();
          pauseVideo();
        });
      }

      /* ── Reveals ── */
      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });
    })();
  </script>
</body>
</html>
