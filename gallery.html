  <style>
    :root {
      --safe-left: env(safe-area-inset-left, 0px);
    }

    /* ── Film Frame ── */
    .film-section {
      width: 100%;
      max-width: 700px;
      text-align: center;
    }

    .film-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: color-mix(in srgb, var(--accent-pink) 10%, transparent);
      border: 2px solid color-mix(in srgb, var(--accent-pink) 25%, transparent);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--duration-base), box-shadow var(--duration-base);
    }

    .film-frame:hover {
      border-color: color-mix(in srgb, var(--accent-pink) 50%, transparent);
      box-shadow: 0 0 40px color-mix(in srgb, var(--accent-rose) 20%, transparent);
    }

    .film-photo {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .film-placeholder {
      text-align: center;
      color: var(--accent-purple);
      font-size: var(--text-base);
    }

    .film-placeholder span { display: block; margin-top: var(--space-2); }

    .film-play-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent-pink) 15%, transparent);
      border: 2px solid color-mix(in srgb, var(--accent-pink) 30%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-2);
      transition: transform var(--duration-base), background var(--duration-base);
    }

    .film-frame:hover .film-play-icon {
      transform: scale(1.1);
      background: color-mix(in srgb, var(--accent-pink) 25%, transparent);
    }

    .film-play-icon svg {
      width: 24px;
      height: 24px;
      fill: var(--accent-rose);
      margin-right: -2px;
    }

    .film-overlay {
      position: absolute;
      inset: 0;
      background: color-mix(in srgb, var(--bg-primary) 50%, transparent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity var(--duration-base);
    }

    .film-frame.playing .film-overlay {
      opacity: 0;
      pointer-events: none;
    }

    .film-vintage {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle, transparent 50%, color-mix(in srgb, var(--text-muted) 8%, transparent) 100%),
        repeating-linear-gradient(0deg, transparent, transparent 2px, color-mix(in srgb, var(--text-muted) 2%, transparent) 2px, color-mix(in srgb, var(--text-muted) 2%, transparent) 4px);
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--duration-base);
    }

    .film-frame.playing .film-vintage {
      opacity: 1;
      animation: vintageFlicker var(--duration-base) ease-in-out infinite;
    }

    @keyframes vintageFlicker {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* ── Masonry Gallery ── */
    .gallery-masonry {
      width: 100%;
      max-width: 960px;
      columns: 1;
      column-gap: var(--space-md);
    }

    @media (min-width: 480px) { .gallery-masonry { columns: 2; } }
    @media (min-width: 768px) { .gallery-masonry { columns: 3; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: var(--space-md);
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: zoom-in;
      background: color-mix(in srgb, var(--accent-pink) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent-pink) 18%, transparent);
      transition: transform var(--duration-base) var(--ease-out-expo),
                  border-color var(--duration-base),
                  box-shadow var(--duration-base);
      will-change: transform;
      contain: layout paint;
    }

    .gallery-item:hover {
      transform: translateY(-6px) scale(1.015);
      border-color: color-mix(in srgb, var(--accent-pink) 45%, transparent);
      box-shadow: 0 12px 40px color-mix(in srgb, var(--accent-rose) 18%, transparent);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform var(--duration-slow) var(--ease-out-expo),
                  filter var(--duration-base),
                  opacity var(--duration-base);
    }

    .gallery-item:hover img { transform: scale(1.05); }

    .img-blur { filter: blur(12px); opacity: 0.6; }
    .img-loaded { filter: blur(0); opacity: 1; }

    /* ── Caption ── */
    .item-caption {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: var(--space-md);
      background: linear-gradient(to top, color-mix(in srgb, var(--text-primary) 72%, transparent) 0%, color-mix(in srgb, var(--text-primary) 25%, transparent) 50%, transparent 100%);
      opacity: 0;
      transition: opacity var(--duration-base) var(--ease-smooth);
      pointer-events: none;
      text-align: center;
    }

    .gallery-item:hover .item-caption { opacity: 1; }

    .item-caption-title {
      font-family: var(--font-display);
      font-size: var(--text-base);
      color: var(--text-on-accent);
      margin-bottom: var(--space-1);
    }

    .item-caption-date {
      font-size: var(--text-xs);
      color: var(--surface-65);
    }

    /* ── Lightbox ── */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      background: rgba(var(--color-bg-dark-rgb), 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--duration-base), visibility 0s var(--duration-base);
    }

    .lightbox-overlay.show {
      opacity: 1;
      visibility: visible;
      transition: opacity var(--duration-base), visibility 0s;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      transform: scale(0.9);
      transition: transform var(--duration-base) var(--ease-out-back);
    }

    .lightbox-overlay.show .lightbox-img {
      transform: scale(1);
    }

    .lightbox-close {
      position: absolute;
      top: var(--space-6);
      left: var(--space-6);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface-25);
      border: 1px solid var(--surface-50);
      color: var(--text-on-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--duration-fast);
      z-index: calc(var(--z-modal) + 1);
    }

    .lightbox-close:hover { background: var(--surface-50); }

    .lightbox-caption {
      position: absolute;
      bottom: var(--space-8);
      left: 0;
      right: 0;
      text-align: center;
      color: var(--surface-80);
      font-size: var(--text-sm);
      padding: var(--space-2);
    }
  </style>
</head>

  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();

      /* ── Auth Guard ── */
      if (window.AuthSystem) AuthSystem.guard();

      /* ── Lightbox ── */
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxCaption = document.getElementById('lightboxCaption');
      const lightboxClose = document.getElementById('lightboxClose');

      document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          const img = item.querySelector('img');
          if (!img) return;
          lightboxImg.src = img.src;
          lightboxImg.alt = img.alt || '';
          lightboxCaption.textContent = item.dataset.caption || '';
          lightbox.classList.add('show');
          lightbox.setAttribute('aria-hidden', 'false');
          document.body.style.overflow = 'hidden';
        });
      });

      function closeLightbox() {
        lightbox.classList.remove('show');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        setTimeout(() => { lightboxImg.src = ''; }, 300);
      }

      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

      /* ── Lazy image blur-up ── */
      document.querySelectorAll('.gallery-item img').forEach(img => {
        img.classList.add('img-blur');
        if (img.complete) img.classList.add('img-loaded');
      });

      /* ── Reveals ── */
      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });
    })();
  </script>
