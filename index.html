  <style>
    .entry-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      text-align: center;
      position: relative;
      z-index: 10;
      gap: var(--space-8);
    }

    .entry-heart {
      width: 160px;
      height: 160px;
      color: var(--accent-rose);
      filter: drop-shadow(0 0 40px rgba(var(--color-primary-rgb), 0.35));
      animation: heartBeat 2s ease-in-out infinite;
      position: relative;
    }

    .entry-heart::before {
      content: '';
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--color-primary-rgb), 0.1), transparent 70%);
      animation: breathe 4s ease-in-out infinite;
    }

    .entry-title {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: var(--space-4);
    }

    .entry-subtitle {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 2;
      font-weight: 400;
    }

    .entry-cta {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      align-items: center;
      margin-top: var(--space-4);
    }

    .entry-nav {
      position: fixed;
      bottom: calc(var(--space-4) + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: var(--z-nav);
      display: flex;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-md);
    }

    .entry-nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-5);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      transition: all var(--duration-fast) var(--ease-smooth);
      border: 1px solid transparent;
      min-height: 40px;
    }

    .entry-nav-link:hover, .entry-nav-link.active {
      color: var(--accent-rose);
      background: rgba(var(--color-primary-rgb), 0.06);
    }

    .entry-nav-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      .entry-heart { width: 120px; height: 120px; }
      .entry-nav-link span { display: none; }
      .entry-nav-link svg { width: 20px; height: 20px; opacity: 1; }
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script src="js/fps.js"></script>
  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';

      const loadingScreen = document.getElementById('loadingScreen');
      const loadingBar = document.getElementById('loadingBar');
      let progress = 0;

      function updateProgress(target, delay) {
        setTimeout(() => {
          progress = target;
          if (loadingBar) loadingBar.style.width = progress + '%';
        }, delay);
      }

      updateProgress(25, 200);
      updateProgress(60, 500);
      updateProgress(100, 1000);

      setTimeout(() => {
        if (loadingScreen) loadingScreen.classList.add('hidden');
        document.querySelectorAll('.reveal').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 200);
        });
      }, 1400);

      if (window.Engine3D) Engine3D.init();

      const enterBtn = document.getElementById('enterBtn');
      if (enterBtn) {
        enterBtn.addEventListener('click', () => {
          if (window.AuthSystem && AuthSystem.isAuthenticated()) {
            if (window.Core) Core.navigateTo('countdown.html');
            else window.location.href = 'countdown.html';
          } else {
            if (window.Core) Core.navigateTo('pin.html?return=countdown.html');
            else window.location.href = 'pin.html?return=countdown.html';
          }
        });
      }
    })();
  </script>
