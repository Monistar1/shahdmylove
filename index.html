<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="عيد ميلاد شودي — تجربة رقمية فاخرة">
  <meta name="theme-color" content="#e91e63">
  <meta property="og:title" content="عيد ميلاد شودي">
  <meta property="og:description" content="تجربة رقمية فاخرة لعيد ميلاد شودي">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <title>عيد ميلاد شودي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/core.css">
  <style>
    .entry-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      text-align: center;
      position: relative;
      z-index: 10;
      gap: var(--space-8);
    }

    .entry-heart {
      width: 160px;
      height: 160px;
      color: var(--accent-rose);
      filter: drop-shadow(0 0 40px rgba(var(--color-primary-rgb), 0.35));
      animation: heartBeat 2s ease-in-out infinite;
      position: relative;
    }

    .entry-heart::before {
      content: '';
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--color-primary-rgb), 0.1), transparent 70%);
      animation: breathe 4s ease-in-out infinite;
    }

    .entry-title {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: var(--space-4);
    }

    .entry-subtitle {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 2;
      font-weight: 400;
    }

    .entry-cta {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      align-items: center;
      margin-top: var(--space-4);
    }

    .entry-nav {
      position: fixed;
      bottom: calc(var(--space-4) + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: var(--z-nav);
      display: flex;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-md);
    }

    .entry-nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-5);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      transition: all var(--duration-fast) var(--ease-smooth);
      border: 1px solid transparent;
      min-height: 40px;
    }

    .entry-nav-link:hover, .entry-nav-link.active {
      color: var(--accent-rose);
      background: rgba(var(--color-primary-rgb), 0.06);
    }

    .entry-nav-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      .entry-heart { width: 120px; height: 120px; }
      .entry-nav-link span { display: none; }
      .entry-nav-link svg { width: 20px; height: 20px; opacity: 1; }
    }
  </style>
</head>
<body data-page="index">
  <a href="#main-content" class="skip-link">تخطى الى المحتوى</a>

  <div class="luxury-bg" aria-hidden="true"></div>
  <div id="bg3d" aria-hidden="true"></div>

  <div class="loading-screen" id="loadingScreen" aria-hidden="true">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor" style="color: var(--accent-rose); animation: heartBeat 1.5s ease-in-out infinite;">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
  </div>

  <main id="main-content" class="entry-page">
    <div class="entry-heart reveal reveal--scale">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-label="قلب">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </div>

    <h1 class="entry-title reveal reveal-delay-1">
      كل عام وأنتِ<br>أجمل هدية
    </h1>

    <p class="entry-subtitle reveal reveal-delay-2">
      فارقتني دقائق وما أنا إلا معكِ.<br>
      اليوم يومكِ، وكل يوم معكِ هو عيد.
    </p>

    <div class="entry-cta reveal reveal-delay-3">
      <button class="btn btn--primary shimmer" id="entryBtn" href="index.html"> 
        ادخلي إلى عالمكِ
      </button>
      <a href="countdown1.html" style="font-size: var(--text-sm); color: var(--text-muted); transition: color var(--duration-fast);">العد التنازلي</a>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/engine3d.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/core.js"></script>
  <script src="js/fps.js"></script>
  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';

      const loadingScreen = document.getElementById('loadingScreen');
      const loadingBar = document.getElementById('loadingBar');
      let progress = 0;

      function updateProgress(target, delay) {
        setTimeout(() => {
          progress = target;
          if (loadingBar) loadingBar.style.width = progress + '%';
        }, delay);
      }

      updateProgress(25, 200);
      updateProgress(60, 500);
      updateProgress(100, 1000);

      setTimeout(() => {
        if (loadingScreen) loadingScreen.classList.add('hidden');
        document.querySelectorAll('.reveal').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 200);
        });
      }, 1400);

      if (window.Engine3D) Engine3D.init();

      const entryBtn = document.getElementById('entryBtn');
      if (entryBtn) {
        entryBtn.addEventListener('click', () => {
          window.location.href = 'pin.html?return=countdown.html';
        });
      }
    })();
  </script>
</body>
</html>
