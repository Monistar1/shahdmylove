<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0f5"/>
      <stop offset="50%" stop-color="#ffe4ec"/>
      <stop offset="100%" stop-color="#f3e5f5"/>
