  <style>
    /* ==========================================================
       LETTERS PAGE — Luxury Romantic Envelopes & Handwriting
       All colors use CSS design-system variables only
       ========================================================== */

    /* Paper texture overlay */
    .paper-texture {
      position: fixed;
      inset: 0;
      z-index: var(--z-particles);
      pointer-events: none;
      opacity: 0.28;
      background-image:
        radial-gradient(ellipse at 20% 30%, color-mix(in srgb, var(--accent-gold), transparent 96%) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, color-mix(in srgb, var(--accent-purple), transparent 97%) 0%, transparent 50%),
        radial-gradient(circle, color-mix(in srgb, var(--text-muted), transparent 95%) 1px, transparent 1px);
      background-size: cover, cover, 24px 24px;
      mix-blend-mode: multiply;
    }

    /* Envelopes Grid */
    .envelopes-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-8);
      max-width: 640px;
      width: 100%;
      perspective: 1200px;
    }

    @media (max-width: 480px) {
      .envelopes-grid {
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
      }
    }

    .envelope {
      position: relative;
      cursor: pointer;
      transition: transform var(--duration-slow) var(--ease-out-expo);
      transform-style: preserve-3d;
    }

    .envelope:hover {
      transform: translateY(-10px) scale(1.04);
    }

    .envelope.opened {
      opacity: 0.4;
      transform: scale(0.95);
      pointer-events: none;
    }

    .envelope.opening {
      pointer-events: none;
    }

    .envelope-body {
      position: relative;
      width: 100%;
      aspect-ratio: 3/2;
      background: linear-gradient(135deg, var(--lilac-100), var(--rose-100));
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      transition: box-shadow var(--duration-base) var(--ease-out-expo);
      transform-style: preserve-3d;
    }

    .envelope:hover .envelope-body {
      box-shadow: var(--shadow-lg), 0 0 40px color-mix(in srgb, var(--accent-purple), transparent 88%);
    }

    /* 3D Envelope Flap */
    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(180deg, var(--lilac-200) 0%, var(--pink-100) 100%);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top center;
      transition: transform 0.7s var(--ease-out-expo);
      z-index: 5;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--text-primary), transparent 90%);
    }

    .envelope.opening .envelope-flap {
      transform: rotateX(-165deg);
    }

    /* Pocket shadow */
    .envelope-pocket {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--accent-gold), transparent 88%) 100%);
      z-index: 4;
      pointer-events: none;
    }

    .envelope-pattern {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--text-secondary), transparent 75%), transparent 70%);
      opacity: 0.5;
    }

    /* Letter sheet that slides out */
    .letter-sheet {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      width: 86%;
      aspect-ratio: 3/4;
      background: linear-gradient(135deg, var(--surface-90), var(--surface-80));
      border-radius: var(--radius-sm);
      box-shadow: 0 -2px 10px color-mix(in srgb, var(--text-primary), transparent 94%);
      z-index: 3;
      transition: transform 0.8s 0.3s var(--ease-out-expo), opacity 0.4s 0.3s var(--ease-smooth);
      pointer-events: none;
      opacity: 0;
    }

    .envelope.opening .letter-sheet {
      transform: translateX(-50%) translateY(-115%);
      opacity: 1;
    }

    .envelope-seal {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    /* 3D Wax Seal */
    .wax-seal {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, var(--rose-700), var(--accent-rose));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 4px 10px color-mix(in srgb, var(--rose-700), transparent 65%),
        0 10px 24px color-mix(in srgb, var(--rose-700), transparent 80%),
        inset 0 -3px 6px color-mix(in srgb, var(--text-primary), transparent 75%),
        inset 0 3px 8px color-mix(in srgb, var(--surface-90), transparent 70%);
      transition: all var(--duration-base) var(--ease-out-expo);
      position: relative;
      transform-style: preserve-3d;
      transform: translateZ(10px);
      cursor: pointer;
    }

    .wax-seal::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, color-mix(in srgb, var(--surface-90), transparent 60%), transparent 55%);
      pointer-events: none;
    }

    .wax-seal::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 1.5px solid color-mix(in srgb, var(--surface-90), transparent 82%);
      pointer-events: none;
    }

    .wax-seal.broken {
      animation: sealBreak 0.65s var(--ease-out-back) forwards;
      pointer-events: none;
    }

    @keyframes sealBreak {
      0% { transform: translateZ(10px) scale(1) rotate(0deg); }
      25% { transform: translateZ(24px) scale(1.18) rotate(-12deg); }
      55% { transform: translateZ(4px) scale(0.88) rotate(12deg); opacity: 0.75; }
      100% { transform: translateZ(-12px) scale(0) rotate(200deg); opacity: 0; }
    }

    .seal-heart {
      width: 18px;
      height: 18px;
      background: var(--pink-300);
      position: relative;
      transform: rotate(-45deg);
      z-index: 1;
      filter: drop-shadow(0 1px 3px color-mix(in srgb, var(--text-primary), transparent 75%));
    }

    .seal-heart::before,
    .seal-heart::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
    }

    .seal-heart::before { top: -50%; left: 0; }
    .seal-heart::after { top: 0; left: 50%; }

    .envelope-label {
      text-align: center;
      margin-top: 24px;
      font-size: var(--text-sm);
      color: var(--accent-purple);
      transition: color var(--duration-base) var(--ease-smooth);
      font-family: var(--font-display);
      font-weight: 700;
    }

    .envelope:hover .envelope-label {
      color: var(--accent-rose);
    }

    /* Letter Modal */
    .letter-view {
      display: none;
      position: fixed;
      inset: 0;
      background: color-mix(in srgb, var(--bg-primary), transparent 6%);
      backdrop-filter: blur(10px) saturate(1.1);
      -webkit-backdrop-filter: blur(10px) saturate(1.1);
      z-index: var(--z-modal);
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }

    .letter-view.show {
      display: flex;
      animation: fadeIn 0.5s var(--ease-smooth);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .letter-paper-open {
      background:
        linear-gradient(135deg, var(--surface-90), var(--surface-80)),
        radial-gradient(circle, color-mix(in srgb, var(--text-muted), transparent 96%) 1px, transparent 1px);
      background-blend-mode: multiply;
      background-size: cover, 20px 20px;
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      max-width: 560px;
      width: 100%;
      max-height: 82vh;
      overflow-y: auto;
      position: relative;
      box-shadow: var(--shadow-xl), 0 0 60px color-mix(in srgb, var(--accent-purple), transparent 92%);
      animation: paperSlide 0.7s var(--ease-out-expo);
      transform-style: preserve-3d;
    }

    @keyframes paperSlide {
      from { transform: translateY(60px) scale(0.92) rotateX(6deg); opacity: 0; }
      to { transform: translateY(0) scale(1) rotateX(0deg); opacity: 1; }
    }

    @media (max-width: 480px) {
      .letter-paper-open {
        padding: var(--space-6);
        max-height: min(82vh, calc(100dvh - var(--space-12) - var(--nav-height) - var(--safe-bottom)));
        overflow-y: auto;
      }
    }

    .paper-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-4);
      border-bottom: 2px solid color-mix(in srgb, var(--accent-purple), transparent 82%);
    }

    .paper-stamp {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple-500), var(--purple-700));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px color-mix(in srgb, var(--purple-500), transparent 75%);
    }

    .paper-stamp::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-on-accent);
      opacity: 0.85;
    }

    .paper-date {
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-family: var(--font-display);
      font-weight: 700;
    }

    .paper-content {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text-primary);
      line-height: 2.6;
      text-align: center;
      margin-bottom: var(--space-6);
      min-height: 140px;
    }

    .paper-content h3 {
      color: var(--accent-purple);
      margin-bottom: var(--space-4);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: var(--text-lg);
    }

    .paper-content p {
      white-space: pre-line;
    }

    /* Typewriter cursor */
    .type-cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent-rose);
      margin-right: 3px;
      animation: blink 0.9s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .paper-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: var(--space-4);
      border-top: 1px solid color-mix(in srgb, var(--accent-purple), transparent 88%);
    }

    .paper-signature {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--accent-purple);
      font-style: italic;
      font-weight: 500;
    }

    .paper-seal-bottom {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--rose-700), var(--accent-rose));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.55;
      box-shadow: inset 0 -2px 4px color-mix(in srgb, var(--text-primary), transparent 80%);
    }

    .seal-mark {
      width: 12px;
      height: 12px;
      background: var(--pink-300);
      position: relative;
      transform: rotate(-45deg);
    }

    .seal-mark::before,
    .seal-mark::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
    }

    .seal-mark::before { top: -50%; left: 0; }
    .seal-mark::after { top: 0; left: 50%; }

    .paper-close {
      display: block;
      margin: var(--space-8) auto 0;
      padding: var(--space-3) var(--space-8);
      background: linear-gradient(135deg, var(--purple-500), var(--purple-700));
      border: none;
      border-radius: var(--radius-xl);
      color: var(--text-on-accent);
      font-family: var(--font-display);
      font-size: var(--text-base);
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-out-expo), box-shadow var(--duration-base) var(--ease-out-expo);
      min-height: 48px;
      min-width: 140px;
      box-shadow: 0 6px 20px color-mix(in srgb, var(--purple-500), transparent 75%);
    }

    .paper-close:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 10px 40px color-mix(in srgb, var(--purple-500), transparent 65%), 0 0 60px color-mix(in srgb, var(--purple-500), transparent 85%);
    }

    /* Seal particles */
    .seal-particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
    }
  </style>
</head>

          <div class="envelope-flap" aria-hidden="true"></div>
          <div class="envelope-pattern" aria-hidden="true"></div>
          <div class="envelope-pocket" aria-hidden="true"></div>
          <div class="letter-sheet" aria-hidden="true"></div>
          <div class="envelope-seal">
            <div class="wax-seal" id="seal3">
              <div class="seal-heart" aria-hidden="true"></div>
            </div>
          </div>
        </div>
        <div class="envelope-label">رسالة الأبد</div>
      </div>
    </div>

    <!-- Letter Modal -->
    <div class="letter-view" id="letterView" role="dialog" aria-modal="true" aria-label="عرض الرسالة">
      <div class="letter-paper-open">
        <div class="paper-header">
          <div class="paper-stamp" aria-hidden="true"></div>
          <div class="paper-date" id="paperDate"></div>
        </div>
        <div class="paper-content" id="paperContent"></div>
        <div class="paper-footer">
          <div class="paper-signature" id="paperSignature">— حبيبكِ</div>
          <div class="paper-seal-bottom" aria-hidden="true">
            <div class="seal-mark"></div>
          </div>
        </div>
        <button class="paper-close" id="paperClose" aria-label="إغلاق الرسالة">إغلاق</button>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/self-evolve.js"></script>
  <script src="js/engine3d.js"></script>
  <script src="js/petals.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/core.js"></script>
  <script src="js/narrative.js"></script>
  <script src="js/fps.js"></script>
  <script>FPSMonitor.init();</script>
  <script>
    (function() {
      'use strict';
      if (window.Engine3D) Engine3D.init();
      if (window.AuthSystem) AuthSystem.guard();

      /* ---- Reveals ---- */
      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 300 + i * 150);
      });

      /* ---- Love Letters ---- */
      const loveLetters = [
        {
          title: "رسالة الأولى",
          content: `شودي الحبيبة،\n\nفي أول يوم عرفتكِ فيه، شعرتُ أن قلبي وجد منزله.\nلم أكن أعلم أن الحب يمكن أن يكون بهذا الجمال،\nبهذا العمق، بهذه السعادة التي لا تُوصف.\n\nأنتِ البداية الجميلة لكل يوم،\nوالنهاية الهادئة لكل ليلة.\nأحبكِ.`
        },
        {
          title: "رسالة الحب",
          content: `حبيبتي شودي،\n\nأحبكِ أكثر مما تتخيلين،\nأكثر مما أستطيع أن أعبر،\nأكثر مما تستحقين.\n\nأحبكِ في صمتكِ وفي ضحكتكِ،\nفي غضبكِ وفي هدوئكِ،\nفي كل تفاصيلكِ التي تجعلكِ أنتِ.\n\nأنتِ حبي، وعالمي، وكل شيء.`
        },
        {
          title: "رسالة الوفاء",
          content: `شودي الغالية،\n\nأعدكِ أن أكون دائماً بجانبكِ،\nفي السراء والضراء،\nفي الصحة والسقم،\nفي الغنى والفقر.\n\nأعدكِ أن أحبكِ كل يوم أكثر من اليوم الذي قبله،\nأن أحترمكِ، أن أقدركِ، أن أدعمكِ.\n\nهذا وعد من قلب يدق باسمكِ فقط.`
        },
        {
          title: "رسالة الأبد",
          content: `إلى شودي - إلى الأبد،\n\nلا أعرف ماذا يخبئ المستقبل،\nلكني أعرف شيئاً واحداً بيقين:\nأنني أريدكِ فيه.\n\nأريدكِ في كل أيامي،\nفي كل لحظاتي،\nفي كل أحلامي.\n\nإلى الأبد يا شهد.\nإلى ما لا نهاية.`
        }
      ];

      /* ---- Init ---- */
      document.addEventListener('DOMContentLoaded', () => {
        initEnvelopes();
      });

      /* ---- Envelopes ---- */
      function initEnvelopes() {
        const envelopes = document.querySelectorAll('.envelope');

        envelopes.forEach((envelope) => {
          envelope.addEventListener('click', () => {
            const letterIndex = parseInt(envelope.getAttribute('data-letter'));
            openLetter(envelope, letterIndex);
          });

          envelope.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              const letterIndex = parseInt(envelope.getAttribute('data-letter'));
              openLetter(envelope, letterIndex);
            }
          });
        });
      }

      function openLetter(envelope, index) {
        if (envelope.classList.contains('opening') || envelope.classList.contains('opened')) return;

        const seal = envelope.querySelector('.wax-seal');
        const letterView = document.getElementById('letterView');
        const paperContent = document.getElementById('paperContent');
        const paperDate = document.getElementById('paperDate');

        // Break seal
        seal.classList.add('broken');
        createSealParticles(seal);

        // Open envelope flap
        envelope.classList.add('opening');

        setTimeout(() => {
          const letter = loveLetters[index];

          const today = new Date();
          paperDate.textContent = today.toLocaleDateString('ar-SA', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });

          letterView.classList.add('show');

          // Handwriting reveal
          handwritingReveal(paperContent, letter.title, letter.content);

          envelope.classList.add('opened');
          envelope.classList.remove('opening');
        }, 1100);

        // Close handlers
        const paperClose = document.getElementById('paperClose');
        const closeHandler = () => {
          letterView.classList.remove('show');
          paperContent.innerHTML = '';
        };

        paperClose.onclick = closeHandler;

        letterView.onclick = (e) => {
          if (e.target === letterView) {
            closeHandler();
          }
        };

        // Escape to close
        const escHandler = (e) => {
          if (e.key === 'Escape') {
            closeHandler();
            document.removeEventListener('keydown', escHandler);
          }
        };
        document.addEventListener('keydown', escHandler);
      }

      /* ---- Handwriting Reveal (Character by Character) ---- */
      function handwritingReveal(container, title, content) {
        container.innerHTML = `
          <h3></h3>
          <p></p>
          <span class="type-cursor"></span>
        `;

        const h3 = container.querySelector('h3');
        const p = container.querySelector('p');
        const cursor = container.querySelector('.type-cursor');

        let phase = 'title'; // 'title' -> 'pause' -> 'content' -> 'done'
        let i = 0;
        const baseSpeed = 32;

        function step() {
          if (phase === 'title') {
            if (i < title.length) {
              h3.textContent += title.charAt(i);
              i++;
              setTimeout(step, baseSpeed + Math.random() * 18);
            } else {
              phase = 'pause';
              i = 0;
              setTimeout(step, 350);
            }
          } else if (phase === 'pause') {
            phase = 'content';
            step();
          } else if (phase === 'content') {
            if (i < content.length) {
              p.textContent += content.charAt(i);
              i++;
              setTimeout(step, baseSpeed + Math.random() * 18);
            } else {
              phase = 'done';
              cursor.remove();
            }
          }
        }

        step();
      }

      /* ---- Seal Break Particles (Luxury 3D shatter) ---- */
      function createSealParticles(seal) {
        const rect = seal.getBoundingClientRect();
        const style = getComputedStyle(document.documentElement);
        const colors = [
          style.getPropertyValue('--accent-rose').trim(),
          style.getPropertyValue('--rose-700').trim(),
          style.getPropertyValue('--pink-300').trim(),
          style.getPropertyValue('--accent-gold').trim(),
          style.getPropertyValue('--accent-pink').trim()
        ];

        for (let i = 0; i < 16; i++) {
          const particle = document.createElement('div');
          particle.className = 'seal-particle';
          const size = 4 + Math.random() * 7;
          particle.style.cssText = `
            left: ${rect.left + rect.width / 2}px;
            top: ${rect.top + rect.height / 2}px;
            width: ${size}px;
            height: ${size}px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
          `;

          document.body.appendChild(particle);

          const angle = (Math.PI * 2 * i) / 16 + (Math.random() - 0.5) * 0.4;
          const velocity = 45 + Math.random() * 55;
          let x = 0, y = 0;
          let opacity = 1;
          const gravity = 35;

          function animate() {
            x += Math.cos(angle) * velocity * 0.016;
            y += Math.sin(angle) * velocity * 0.016 + gravity * 0.016;
            opacity -= 0.022;

            particle.style.transform = `translate(${x}px, ${y}px) scale(${Math.max(0.2, opacity)})`;
            particle.style.opacity = opacity;

            if (opacity > 0) {
              requestAnimationFrame(animate);
            } else {
              particle.remove();
            }
          }

          requestAnimationFrame(animate);
        }
      }
    })();
  </script>
</body>
</html>
